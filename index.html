// Tab 5: 排行与推荐
// ════════════════════════════════════════════════════════════════════════
const T5 = {
  inited: false,
  activeDays: 0,
  init() {
    this.inited = true;
    this.renderChart();
    this.renderCombos();
    this.renderStats();
    document.getElementById("t5-sort").addEventListener("change", () => this.renderChart());
    document.getElementById("t5-type-filter").addEventListener("change", () => this.renderChart());
    document.getElementById("t5-time-btns").querySelectorAll(".t5-time-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.getElementById("t5-time-btns").querySelectorAll(".t5-time-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        this.activeDays = parseInt(btn.dataset.days) || 0;
        this.renderChart();
      });
    });
  },
  _filterByTime(nodes) {
    if (!this.activeDays) return nodes;
    const cutoff = new Date(Date.now() - this.activeDays * 86400000).toISOString().slice(0, 10);
    return nodes.filter(n => (n.collected_at || "").slice(0, 10) >= cutoff);
  },
  renderChart() {
    const sortKey = document.getElementById("t5-sort").value;
    const typeFilter = document.getElementById("t5-type-filter").value;
    let allNodes = G.nodes.map(n => ({...n, deg: degree[n.id]||0, wdeg: wDegree[n.id]||0}));
    allNodes = this._filterByTime(allNodes);
    const totalCount = allNodes.length;
    if (typeFilter !== "all") allNodes = allNodes.filter(n => n.type === typeFilter);
    allNodes.sort((a,b) => sortKey==="degree" ? b.deg-a.deg : b.wdeg-a.wdeg);
    let nodes = allNodes.slice(0, 30);

    const svg = d3.select("#t5-chart");
    svg.selectAll("*").remove();
    svg.attr("width", 0).attr("height", 0);

    // B2: empty state guard
    const existingEmpty = document.getElementById("t5-chart-empty");
    if (nodes.length === 0) {
      if (!existingEmpty) {
        const emptyDiv = document.createElement("div");
        emptyDiv.id = "t5-chart-empty";
        emptyDiv.style.cssText = "padding:40px;text-align:center;color:#64748b;";
        emptyDiv.textContent = "暂无数据";
        document.getElementById("t5-chart").insertAdjacentElement("afterend", emptyDiv);
      }
      return;
    }
    if (existingEmpty) existingEmpty.remove();

    // D3: dynamic left margin based on longest label
    const maxLabelLen = Math.min(200, Math.max(...nodes.slice(0, 20).map(n => n.name.length)) * 14 + 16);
    const margin = {top:10, right:20, bottom:10, left: maxLabelLen};
    const barH = 24, gap = 4;
    const chartH = nodes.length*(barH+gap) + margin.top + margin.bottom;
    const chartW = Math.min(900, document.getElementById("tab5").clientWidth - 40);
    svg.attr("width", chartW).attr("height", chartH);

    const maxVal = d3.max(nodes, d => sortKey==="degree"?d.deg:d.wdeg) || 1;
    const x = d3.scaleLinear().domain([0, maxVal]).range([0, chartW - margin.left - margin.right]);
    const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

    nodes.forEach((d, i) => {
      const y = i * (barH + gap);
      const val = sortKey==="degree" ? d.deg : d.wdeg;
      g.append("rect").attr("x",0).attr("y",y).attr("width",x(val)).attr("height",barH)
        .attr("rx",4).attr("fill",COLORS[d.type]||"#666").attr("opacity",0.85);
      g.append("text").attr("x",-6).attr("y",y+barH/2).attr("dy","0.35em")
        .attr("text-anchor","end").attr("fill","#e2e8f0").attr("font-size","12px").text(d.name);
      g.append("text").attr("x",x(val)+6).attr("y",y+barH/2).attr("dy","0.35em")
        .attr("fill","#94a3b8").attr("font-size","11px").text(val);
    });
  },
  renderCombos() {
    // find genres with most diverse connections as "recommended combos"
    const genres = G.nodes.filter(n => n.type === "genre");
    const combos = genres.map(g => {
      const nb = neighbors(g.id);
      const items = [];
      nb.forEach(({node: nid, edge}) => {
        const nd = nodeById(nid);
        if (nd) items.push(nd);
      });
      return {genre: g, items, score: items.length};
    }).filter(c => c.items.length >= 2).sort((a,b) => b.score - a.score).slice(0, 8);

    const container = document.getElementById("t5-combo-list");
    container.innerHTML = combos.map(c => {
      const itemsHtml = c.items.map(i =>
        `<span class="recipe-item" style="background:${COLORS[i.type]}33;color:${COLORS[i.type]}">${esc(i.name)}</span>`
      ).join("");
      return `<div class="card combo-card">
        <h4 style="color:${COLORS.genre}">${esc(c.genre.name)} <span style="color:#64748b;font-size:12px">(${c.items.length} 关联)</span></h4>
        ${c.genre.description?`<div style="color:#94a3b8;font-size:12px;margin-bottom:6px">${esc(c.genre.description)}</div>`:""}
        <div class="combo-items">${itemsHtml}</div>
      </div>`;
    }).join("") || '<div style="color:#64748b">数据不足，暂无推荐</div>';
  },
  renderStats() {
    const container = document.getElementById("t5-stats-charts");
    container.innerHTML = "";
    const svgEsc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

    // ── 1. 节点类型分布 ──
    const typeCounts = {};
    G.nodes.forEach(n => { typeCounts[n.type] = (typeCounts[n.type] || 0) + 1; });
    const typeEntries = Object.entries(typeCounts).sort((a, b) => b[1] - a[1]);

    // ── 2. 边类型 Top-10 ──
    const edgeCounts = {};
    G.edges.forEach(e => { edgeCounts[e.type] = (edgeCounts[e.type] || 0) + 1; });
    const edgeEntries = Object.entries(edgeCounts).sort((a, b) => b[1] - a[1]).slice(0, 10);

    // ── 3. 孤立节点 ──
    const connectedIds = new Set();
    G.edges.forEach(e => { connectedIds.add(e.source); connectedIds.add(e.target); });
    const isolated = G.nodes.filter(n => !connectedIds.has(n.id));

    // render compact bar charts
    const makeBar = (title, entries, labelMap) => {
      if (!entries.length) return `<div class="card"><h3 style="font-size:14px;margin-bottom:8px">${title}</h3><p style="color:#64748b;font-size:12px">暂无数据</p></div>`;
      const maxVal = Math.max(...entries.map(e => e[1]));
      const barH = 18, gap = 4, labelW = 120, valW = 30;
      const chartW = 380, chartH = entries.length * (barH + gap) + 10;
      let bars = "";
      entries.forEach(([label, count], i) => {
        const y = i * (barH + gap) + 5;
        const barW = maxVal > 0 ? ((count / maxVal) * (chartW - labelW - valW - 16)) : 0;
        const color = COLORS[label] || "#3b82f6";
        const displayLabel = labelMap[label] || label;
        bars += `<g>
          <text x="${labelW - 6}" y="${y + barH / 2}" text-anchor="end" fill="#94a3b8" font-size="11" dominant-baseline="central">${svgEsc(displayLabel)}</text>
          <rect x="${labelW}" y="${y}" width="${barW}" height="${barH}" rx="3" fill="${color}" opacity="0.75"/>
          <text x="${labelW + barW + 4}" y="${y + barH / 2}" fill="#e2e8f0" font-size="11" dominant-baseline="central">${count}</text>
        </g>`;
      });
      return `<div class="card">
        <h3 style="font-size:14px;margin-bottom:8px">${title}</h3>
        <svg width="100%" viewBox="0 0 ${chartW} ${chartH}" style="max-height:${Math.min(chartH, 400)}px;overflow:visible">${bars}</svg>
      </div>`;
    };

    container.innerHTML = makeBar("节点类型分布", typeEntries, TL) + makeBar("边类型 Top-10", edgeEntries, ETL);

    // isolated nodes
    if (isolated.length > 0) {
      const items = isolated.map(n => {
        const color = COLORS[n.type] || "#3b82f6";
        return `<span style="display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;margin:2px;background:${color}33;color:${color}">${esc(n.name)} (${TL[n.type]||n.type})</span>`;
      }).join("");
      container.innerHTML += `<div class="card" style="grid-column:1/-1">
        <h3 style="font-size:14px;margin-bottom:8px">孤立节点 <span style="font-size:11px;color:#64748b;font-weight:normal">(${isolated.length} 个)</span></h3>
        <div style="display:flex;flex-wrap:wrap;gap:3px">${items}</div>
      </div>`;
    } else {
      container.innerHTML += `<div class="card" style="grid-column:1/-1">
        <h3 style="font-size:14px;margin-bottom:8px">孤立节点</h3>
        <p style="color:#10b981;font-size:12px">没有孤立节点 ✔</p>
      </div>`;
    }
  }
};

// ════════════════════════════════════════════════════════════════════════
// Tab 7: 关系图 (全局概览 + 双击聚焦探索)
// ════════════════════════════════════════════════════════════════════════
const T7 = {
  inited: false,
  activeTypes: new Set(["genre","catharsis","twist","technique","setting"]),
  mode: "global", // "global" | "focus"
  focusNodeId: null,
  focusHops: 2,
  searchQ: "",
  svg: null,
  sim: null,

  init() {
    this.inited = true;
    const ctrl = document.getElementById("t7-controls");
    ctrl.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const t = btn.dataset.type;
        if (this.activeTypes.has(t)) { this.activeTypes.delete(t); btn.classList.remove("active"); }
        else { this.activeTypes.add(t); btn.classList.add("active"); }
        if (this.mode === "global") this.renderGlobal();
        else this.renderFocus();
      });
    });
    document.getElementById("t7-search").addEventListener("input", function() {
      T7.searchQ = this.value.toLowerCase();
      T7.applySearch();
      T7.updateStats();
    });
    // Focus bar: hop buttons
    document.querySelectorAll(".t7-hop-btn[data-hops]").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".t7-hop-btn[data-hops]").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        T7.focusHops = parseInt(btn.dataset.hops);
        if (T7.focusNodeId) T7.renderFocus();
      });
    });
    document.getElementById("t7-back-global").addEventListener("click", () => this.exitFocus());
    // Focus list search
    document.getElementById("t7-focus-search").addEventListener("input", function() {
      T7._filterFocusList(this.value.toLowerCase());
    });
    this.renderGlobal();
  },

  // ── 全局模式 ──
  renderGlobal() {
    this.mode = "global";
    document.getElementById("t7-focus-list").classList.remove("open");
    document.getElementById("t7-focus-bar").classList.remove("open");
    document.getElementById("t7-controls").style.display = "";

    const container = document.getElementById("tab7");
    const w = container.clientWidth, h = container.clientHeight;
    const nodes = G.nodes.filter(n => this.activeTypes.has(n.type)).map(n => ({...n}));
    const ids = new Set(nodes.map(n => n.id));
    const edges = G.edges.filter(e => ids.has(e.source) && ids.has(e.target))
      .map(e => ({source:e.source, target:e.target, type:e.type, weight:e.weight||1}));

    this._renderForce(nodes, edges, w, h, true);
    this.updateStats();
  },

  // ── 聚焦模式 ──
  enterFocus(nodeId) {
    this.mode = "focus";
    this.focusNodeId = nodeId;
    document.getElementById("t7-controls").style.display = "none";
    document.getElementById("t7-focus-list").classList.add("open");
    document.getElementById("t7-focus-bar").classList.add("open");
    this.renderFocus();
  },

  renderFocus() {
    if (!this.focusNodeId) return;
    // Collect nodes within N hops
    const visited = new Set([this.focusNodeId]);
    let frontier = [this.focusNodeId];
    for (let hop = 0; hop < this.focusHops; hop++) {
      const next = [];
      for (const nid of frontier) {
        for (const e of G.edges) {
          const other = e.source === nid ? e.target : (e.target === nid ? e.source : null);
          if (other && !visited.has(other)) {
            const nd = nodeById(other);
            if (nd && this.activeTypes.has(nd.type)) { visited.add(other); next.push(other); }
          }
        }
      }
      frontier = next;
    }
    const nodes = [...visited].map(id => ({...nodeById(id)})).filter(Boolean);
    const ids = new Set(nodes.map(n => n.id));
    const edges = G.edges.filter(e => ids.has(e.source) && ids.has(e.target))
      .map(e => ({source:e.source, target:e.target, type:e.type, weight:e.weight||1}));

    const container = document.getElementById("tab7");
    const listW = 220;
    const w = container.clientWidth - listW, h = container.clientHeight;
    this._renderForce(nodes, edges, w, h, false, listW);
    this._renderFocusList(nodes);
    this.updateStats();
  },

  exitFocus() {
    this.focusNodeId = null;
    this.closeDetail();
    this.renderGlobal();
  },

  _renderFocusList(nodes) {
    const wrap = document.getElementById("t7-focus-items");
    wrap.innerHTML = "";
    const sorted = [...nodes].sort((a,b) => (degree[b.id]||0)-(degree[a.id]||0));
    sorted.forEach(n => {
      const div = document.createElement("div");
      div.className = "t7-list-item" + (n.id === this.focusNodeId ? " active" : "");
      div.innerHTML = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${COLORS[n.type]};margin-right:6px;vertical-align:middle;"></span>${esc(n.name)}`;
      div.dataset.id = n.id;
      div.dataset.name = n.name.toLowerCase();
      div.addEventListener("click", () => {
        this.focusNodeId = n.id;
        this.renderFocus();
      });
      wrap.appendChild(div);
    });
  },

  _filterFocusList(q) {
    document.querySelectorAll("#t7-focus-items .t7-list-item").forEach(el => {
      el.style.display = (!q || el.dataset.name.includes(q)) ? "" : "none";
    });
  },

  // ── 共享力导向渲染 ──
  _renderForce(nodes, edges, w, h, isGlobal, offsetX) {
    offsetX = offsetX || 0;
    const svgEl = d3.select("#t7-svg").attr("width", w + offsetX).attr("height", h);
    svgEl.selectAll("*").remove();

    const g = svgEl.append("g").attr("transform", `translate(${offsetX},0)`);
    const zoom = d3.zoom().scaleExtent([0.2, 5]).on("zoom", e => g.attr("transform", `translate(${offsetX + e.transform.x},${e.transform.y}) scale(${e.transform.k})`));
    svgEl.call(zoom);

    const sim = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(edges).id(d => d.id).distance(isGlobal ? 100 : 80))
      .force("charge", d3.forceManyBody().strength(isGlobal ? -400 : -300))
      .force("center", d3.forceCenter(w/2, h/2))
      .force("collision", d3.forceCollide(isGlobal ? 30 : 25));
    this.sim = sim;

    // Edge type color map
    const edgeColor = d => {
      if (d.type === "genre_set_in") return "#10b981";
      if (d.type === "setting_enables") return "#8b5cf6";
      if (d.type === "genre_has_catharsis") return "#ef444488";
      if (d.type === "genre_uses_technique") return "#3b82f688";
      return "#475569";
    };

    const link = g.append("g").selectAll("line").data(edges).join("line")
      .attr("class", "link")
      .attr("stroke", edgeColor)
      .attr("stroke-width", d => Math.max(1, Math.min(3, d.weight)))
      .attr("stroke-opacity", 0.4);

    const focusCenter = this.focusNodeId;
    const node = g.append("g").selectAll("g").data(nodes).join("g").call(
      d3.drag().on("start", (e,d) => { if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
        .on("drag", (e,d) => { d.fx=e.x; d.fy=e.y; })
        .on("end", (e,d) => { if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
    );

    node.append("circle").attr("class", "node-circle")
      .attr("r", d => {
        if (d.id === focusCenter) return 26;
        return Math.max(8, Math.min(22, 5 + (degree[d.id]||0) * 2));
      })
      .attr("fill", d => COLORS[d.type] || "#666")
      .attr("stroke", d => d.id === focusCenter ? "#fff" : "#0f172a")
      .attr("stroke-width", d => d.id === focusCenter ? 2.5 : 1.5);

    node.append("text").attr("class", "node-text")
      .attr("dy", d => -(Math.max(8, Math.min(22, 5 + (degree[d.id]||0) * 2)) + 6))
      .text(d => d.name);

    const tip = document.getElementById("t7-tip");
    node.on("mouseover", (e,d) => {
      tip.style.display = "block";
      tip.innerHTML = `<b style="color:${COLORS[d.type]}">${esc(d.name)}</b><br><span style="color:#94a3b8">${TL[d.type]}</span><br><span style="color:#64748b">${degree[d.id]||0} 个连接</span>${isGlobal ? '<br><span style="color:#475569;font-size:11px">双击聚焦探索</span>':''}`;
    }).on("mousemove", e => {
      tip.style.left = (e.clientX + 12) + "px";
      tip.style.top = (e.clientY - 10) + "px";
    }).on("mouseout", () => { tip.style.display = "none"; });

    // Click = show detail, Double-click = enter focus
    node.on("click", (e,d) => { e.stopPropagation(); T7.showDetail(d); });
    node.on("dblclick", (e,d) => { e.stopPropagation(); T7.enterFocus(d.id); });

    sim.on("tick", () => {
      link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
      node.attr("transform", d => `translate(${d.x},${d.y})`);
    });

    this.svg = svgEl;
  },

  applySearch() {
    if (!this.svg) return;
    const q = this.searchQ;
    this.svg.selectAll(".node-circle").attr("opacity", d => (!q || d.name.toLowerCase().includes(q)) ? 1 : 0.15);
    this.svg.selectAll("text.node-text").attr("opacity", d => (!q || d.name.toLowerCase().includes(q)) ? 1 : 0.1);
    this.svg.selectAll(".link").attr("opacity", d => {
      if (!q) return 0.4;
      const sn = typeof d.source === "object" ? d.source.name : "";
      const tn = typeof d.target === "object" ? d.target.name : "";
      return (sn.toLowerCase().includes(q) || tn.toLowerCase().includes(q)) ? 0.6 : 0.05;
    });
  },

  updateStats() {
    const total = G.nodes.filter(n => this.activeTypes.has(n.type)).length;
    const q = this.searchQ || "";
    const shown = q ? G.nodes.filter(n => this.activeTypes.has(n.type) && n.name.toLowerCase().includes(q)).length : total;
    const statsEl = document.getElementById("t7-stats");
    if (!statsEl) return;
    const eCount = G.edges.filter(e => {
      const sn = nodeById(e.source), tn = nodeById(e.target);
      return sn && tn && this.activeTypes.has(sn.type) && this.activeTypes.has(tn.type);
    }).length;
    const modeLabel = this.mode === "focus" ? " [聚焦模式]" : "";
    if (q) {
      statsEl.textContent = `显示 ${shown} / ${total} 个节点  ${eCount} 边${modeLabel}`;
    } else {
      statsEl.textContent = `${total} 节点  ${eCount} 边${modeLabel}`;
    }
  },

  // ── 详情面板 ──
  showDetail(d) {
    const node = nodeById(d.id) || d;
    d3.select("#t7-d-name").text(node.name);
    const typeBadge = document.getElementById("t7-d-type");
    typeBadge.textContent = TL[node.type]||node.type;
    typeBadge.style.background = COLORS[node.type]||"#666";
    if (node.type === "genre") typeBadge.dataset.type = "genre"; else delete typeBadge.dataset.type;
    d3.select("#t7-d-desc").text(node.description||"暂无描述");
    d3.select("#t7-d-tags").html((node.tags||[]).map(t=>`<span class="tag-chip">${esc(t)}</span>`).join("") || '<span style="color:#475569">无标签</span>');
    d3.select("#t7-d-examples").html((node.examples||[]).map(ex=>`<div style="color:#e2e8f0;font-size:13px;margin:2px 0">• ${esc(ex)}</div>`).join("") || '<span style="color:#475569">无案例</span>');
    // Related edges
    const relEdges = G.edges.filter(e => e.source === node.id || e.target === node.id);
    d3.select("#t7-d-edges").html(relEdges.slice(0,15).map(e => {
      const other = e.source === node.id ? nodeById(e.target) : nodeById(e.source);
      if (!other) return "";
      return `<div style="font-size:12px;margin:2px 0;color:#94a3b8"><span style="color:${COLORS[other.type]}">${esc(other.name)}</span> <span style="color:#475569">[${e.type.replace(/_/g," ")}]</span></div>`;
    }).join("") || '<span style="color:#475569">无关联边</span>');
    d3.select("#t7-d-urls").html((node.source_urls||[]).filter(u=>/^https?:\/\//i.test(u)).map(u=>{const display=u.length>50?u.slice(0,47)+"…":u;return `<a href="${esc(u)}" title="${esc(u)}" target="_blank" rel="noopener">${esc(display)}</a>`;}).join("") || '<span style="color:#475569">无来源</span>');
    document.getElementById("t7-detail-panel").classList.add("open");
    document.getElementById("panel-overlay").style.display = "block";
  },

  closeDetail() {
    document.getElementById("t7-detail-panel").classList.remove("open");
    document.getElementById("panel-overlay").style.display = "none";
  }
};

// ════════════════════════════════════════════════════════════════════════
// Tab 9 & 10: 已移除 (弦图 & 桑基图)
// ════════════════════════════════════════════════════════════════════════
const T9 = { inited:true, init(){} }; // 已移除
const T10 = { inited:true, init(){} }; // 已移除

// ── Tab 11: 图谱编辑器 ──
const T11 = {
  inited: false,
  log: [],
  undoStack: [],
  init() {
    this.inited = true;
    this.refreshSelects();
    this.refreshStats();
    this.renderLog();

    // Add node
    document.getElementById("t11-add-node").onclick = () => {
      const type = document.getElementById("t11-node-type").value;
      const rawName = document.getElementById("t11-node-name").value;
      const name = rawName.trim();
      if (!name) { alert("请输入节点名称"); return; }
      // B4: improved ID generation with deduplication
      let slug = name.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff]/g, "-").replace(/-+/g,"-").replace(/^-|-$/g,"");
      if (!slug) slug = "node-" + Date.now();
      let id = type + "-" + slug;
      // Ensure no duplicate IDs
      if (_nodeMap.has(id)) {
        let suffix = 2;
        while (_nodeMap.has(id + "-" + suffix)) suffix++;
        id = id + "-" + suffix;
      }
      const now = new Date().toISOString();
      const desc = document.getElementById("t11-node-desc").value.trim();
      const tagsStr = document.getElementById("t11-node-tags").value.trim();
      const tags = tagsStr ? tagsStr.split(",").map(t => t.trim()).filter(Boolean) : [];
      const node = { id, type, name, name_normalized: name, description: desc, tags, source_urls: [], collected_at: now, updated_at: now };
      G.nodes.push(node);
      _nodeMap.set(id, node);
      // U6: push to undo stack
      T11.undoStack.push({type: "node", id});
      T11.updateUndoBtn();
      // Reset other tabs so they re-render with new data
      T11.resetOtherTabs();
      T11.log.unshift({ kind: "node", action: "add", id, name, type });
      // Clear form
      document.getElementById("t11-node-name").value = "";
      document.getElementById("t11-node-desc").value = "";
      document.getElementById("t11-node-tags").value = "";
      T11.refreshSelects();
      T11.refreshStats();
      T11.renderLog();
      // U3: toast
      showToast("✅ 已添加节点，其他视图将在切换时更新");
    };

    // Add edge
    document.getElementById("t11-add-edge").onclick = () => {
      const source = document.getElementById("t11-edge-source").value;
      const target = document.getElementById("t11-edge-target").value;
      const etype = document.getElementById("t11-edge-type").value;
      const weight = parseInt(document.getElementById("t11-edge-weight").value) || 1;
      if (!source || !target) { alert("请选择源节点和目标节点"); return; }
      if (source === target) { alert("源节点和目标节点不能相同"); return; }
      const edgeId = "e-" + source + "--" + etype + "--" + target;
      if (G.edges.find(e => e.id === edgeId)) { alert("该边已存在"); return; }
      const edge = { id: edgeId, source, target, type: etype, weight, source_urls: [] };
      G.edges.push(edge);
      // U6: push to undo stack
      T11.undoStack.push({type: "edge", id: edgeId});
      T11.updateUndoBtn();
      T11.resetOtherTabs();
      const sn = nodeById(source), tn = nodeById(target);
      T11.log.unshift({ kind: "edge", action: "add", id: edgeId, name: (sn?.name||source) + " → " + (tn?.name||target), type: etype });
      T11.refreshStats();
      T11.renderLog();
      // U3: toast
      showToast("✅ 已添加节点，其他视图将在切换时更新");
    };

    // Export
    document.getElementById("t11-export").onclick = () => {
      const json = JSON.stringify(G, null, 2);
      const blob = new Blob([json], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "graph.json";
      a.click();
      URL.revokeObjectURL(a.href);
      // U3: toast
      showToast("✅ 已下载 graph.json");
    };

    // U6: Undo button
    document.getElementById("t11-undo").onclick = () => {
      if (T11.undoStack.length === 0) return;
      const last = T11.undoStack.pop();
      if (last.type === "node") {
        G.nodes = G.nodes.filter(n => n.id !== last.id);
        G.edges = G.edges.filter(e => e.source !== last.id && e.target !== last.id);
        _nodeMap.delete(last.id);
      } else if (last.type === "edge") {
        G.edges = G.edges.filter(e => e.id !== last.id);
      }
      T11.resetOtherTabs();
      T11.refreshSelects();
      T11.refreshStats();
      T11.renderLog();
      T11.updateUndoBtn();
    };

    T11.updateUndoBtn();

    // ── Edit / Delete node ──
    document.getElementById("t11-edit-node-sel").addEventListener("change", e => {
      if (e.target.value) T11._loadNodeForEdit(e.target.value);
      else T11._clearNodeEdit();
    });
    document.getElementById("t11-save-node").onclick = () => T11._saveNode();
    document.getElementById("t11-delete-node").onclick = () => T11._deleteNode();

    // ── Edit / Delete edge ──
    document.getElementById("t11-edit-edge-sel").addEventListener("change", e => {
      if (e.target.value) T11._loadEdgeForEdit(e.target.value);
      else T11._clearEdgeEdit();
    });
    document.getElementById("t11-save-edge").onclick = () => T11._saveEdge();
    document.getElementById("t11-delete-edge").onclick = () => T11._deleteEdge();

    T11.refreshEditSelects();
  },

  updateUndoBtn() {
    const btn = document.getElementById("t11-undo");
    if (btn) btn.disabled = T11.undoStack.length === 0;
  },

  resetOtherTabs() {
    [T2,T3,T4,T5,T7,T9,T10].forEach(t => { t.inited = false; });
    if (typeof T13 !== "undefined") T13.inited = false;
    // Rebuild _nodeMap
    _nodeMap.clear(); G.nodes.forEach(n => _nodeMap.set(n.id, n));
    // Recalculate degree maps
    for (const k in degree) delete degree[k];
    for (const k in wDegree) delete wDegree[k];
    G.edges.forEach(e => {
      const w = e.weight || 1;
      degree[e.source] = (degree[e.source]||0)+1;
      degree[e.target] = (degree[e.target]||0)+1;
      wDegree[e.source] = (wDegree[e.source]||0)+w;
      wDegree[e.target] = (wDegree[e.target]||0)+w;
    });
  },

  refreshSelects() {
    const types = ["genre","catharsis","twist","technique","setting"];
    const labels = {genre:"题材",catharsis:"爽点",twist:"转折",technique:"技巧",setting:"世界设定"};
    ["t11-edge-source","t11-edge-target"].forEach(selId => {
      const sel = document.getElementById(selId);
      const cur = sel.value;
      sel.innerHTML = '<option value="">-- 选择节点 --</option>';
      types.forEach(t => {
        const group = document.createElement("optgroup");
        group.label = labels[t];
        G.nodes.filter(n => n.type === t).forEach(n => {
          const opt = document.createElement("option");
          opt.value = n.id;
          opt.textContent = n.name;
          group.appendChild(opt);
        });
        sel.appendChild(group);
      });
      if (cur) sel.value = cur;
    });
  },

  refreshStats() {
    const types = ["genre","catharsis","twist","technique","setting"];
    const labels = {genre:"题材",catharsis:"爽点",twist:"转折",technique:"技巧",setting:"世界设定"};
    const counts = {};
    types.forEach(t => { counts[t] = G.nodes.filter(n => n.type === t).length; });
    const row = document.getElementById("t11-stat-row");
    row.innerHTML = types.map(t =>
      `<span class="t11-stat-item"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${COLORS[t]};margin-right:4px;vertical-align:middle;"></span>${labels[t]}: <b>${counts[t]}</b></span>`
    ).join("") + `<span class="t11-stat-item">| 节点: <b>${G.nodes.length}</b>  边: <b>${G.edges.length}</b></span>`;
    this.refreshEditSelects();
  },

  // ── Edit / Delete helpers ──

  refreshEditSelects() {
    const types = ["genre","catharsis","twist","technique","setting"];
    const labels = {genre:"题材",catharsis:"爽点",twist:"转折",technique:"技巧",setting:"世界设定"};
    const nodeSel = document.getElementById("t11-edit-node-sel");
    if (!nodeSel) return;
    const curNode = nodeSel.value;
    nodeSel.innerHTML = '<option value="">-- 选择节点 --</option>';
    types.forEach(t => {
      const group = document.createElement("optgroup");
      group.label = labels[t];
      G.nodes.filter(n => n.type === t).forEach(n => {
        const opt = document.createElement("option");
        opt.value = n.id; opt.textContent = n.name;
        group.appendChild(opt);
      });
      nodeSel.appendChild(group);
    });
    if (curNode && G.nodes.find(n => n.id === curNode)) nodeSel.value = curNode;
    else if (curNode) this._clearNodeEdit();

    const edgeSel = document.getElementById("t11-edit-edge-sel");
    const curEdge = edgeSel.value;
    edgeSel.innerHTML = '<option value="">-- 选择边 --</option>';
    G.edges.forEach(e => {
      const sn = nodeById(e.source), tn = nodeById(e.target);
      const opt = document.createElement("option");
      opt.value = e.id;
      opt.textContent = (sn?.name||e.source) + " → " + (tn?.name||e.target) + " [" + e.type + "]";
      edgeSel.appendChild(opt);
    });
    if (curEdge && G.edges.find(e => e.id === curEdge)) edgeSel.value = curEdge;
    else if (curEdge) this._clearEdgeEdit();
  },

  _clearNodeEdit() {
    document.getElementById("t11-edit-node-info").textContent = "未选择节点";
    document.getElementById("t11-edit-node-name").value = "";
    document.getElementById("t11-edit-node-desc").value = "";
    document.getElementById("t11-edit-node-tags").value = "";
    document.getElementById("t11-save-node").disabled = true;
    document.getElementById("t11-delete-node").disabled = true;
  },

  _clearEdgeEdit() {
    document.getElementById("t11-edit-edge-info").textContent = "未选择边";
    document.getElementById("t11-edit-edge-weight").value = "1";
    document.getElementById("t11-save-edge").disabled = true;
    document.getElementById("t11-delete-edge").disabled = true;
  },

  _loadNodeForEdit(nodeId) {
    const node = nodeById(nodeId);
    if (!node) { this._clearNodeEdit(); return; }
    const info = document.getElementById("t11-edit-node-info");
    info.innerHTML = `<span style="color:${COLORS[node.type]}">[${TL[node.type]||node.type}]</span> &nbsp;<code style="font-size:11px;color:#64748b">${esc(node.id)}</code>`;
    document.getElementById("t11-edit-node-name").value = node.name;
    document.getElementById("t11-edit-node-desc").value = node.description || "";
    document.getElementById("t11-edit-node-tags").value = (node.tags||[]).join(", ");
    document.getElementById("t11-save-node").disabled = false;
    document.getElementById("t11-delete-node").disabled = false;
  },

  _loadEdgeForEdit(edgeId) {
    const edge = G.edges.find(e => e.id === edgeId);
    if (!edge) { this._clearEdgeEdit(); return; }
    const sn = nodeById(edge.source), tn = nodeById(edge.target);
    const info = document.getElementById("t11-edit-edge-info");
    info.innerHTML = `<span style="color:${COLORS[sn?.type]||'#e2e8f0'}">${esc(sn?.name||edge.source)}</span> → <span style="color:${COLORS[tn?.type]||'#e2e8f0'}">${esc(tn?.name||edge.target)}</span> &nbsp;<code style="font-size:11px;color:#64748b">w=${edge.weight||1}</code>`;
    document.getElementById("t11-edit-edge-type").value = edge.type;
    document.getElementById("t11-edit-edge-weight").value = edge.weight || 1;
    document.getElementById("t11-save-edge").disabled = false;
    document.getElementById("t11-delete-edge").disabled = false;
  },

  _saveNode() {
    const nodeId = document.getElementById("t11-edit-node-sel").value;
    const node = nodeById(nodeId);
    if (!node) return;
    const newName = document.getElementById("t11-edit-node-name").value.trim();
    if (!newName) { showToast("⚠️ 名称不能为空"); return; }
    const oldName = node.name;
    node.name = newName;
    node.name_normalized = newName;
    node.description = document.getElementById("t11-edit-node-desc").value.trim();
    const tagsStr = document.getElementById("t11-edit-node-tags").value.trim();
    node.tags = tagsStr ? tagsStr.split(",").map(t => t.trim()).filter(Boolean) : [];
    node.updated_at = new Date().toISOString();
    this.log.unshift({ kind:"node", action:"edit", id:nodeId, name: newName + (oldName!==newName?` (原: ${oldName})`:""), type:node.type });
    this.resetOtherTabs();
    this.refreshSelects();
    this.refreshStats();
    this.renderLog();
    this._loadNodeForEdit(nodeId);
    showToast("✅ 节点已更新");
  },

  _deleteNode() {
    const nodeId = document.getElementById("t11-edit-node-sel").value;
    const node = nodeById(nodeId);
    if (!node) return;
    const affectedEdges = G.edges.filter(e => e.source===nodeId||e.target===nodeId).length;
    if (!confirm(`确认删除节点「${node.name}」？\n同时删除 ${affectedEdges} 条关联边。此操作无法撤销。`)) return;
    const name = node.name, type = node.type;
    G.nodes = G.nodes.filter(n => n.id !== nodeId);
    G.edges = G.edges.filter(e => e.source!==nodeId && e.target!==nodeId);
    _nodeMap.delete(nodeId);
    this.log.unshift({ kind:"node", action:"delete", id:nodeId, name:`${name}（含 ${affectedEdges} 条边）`, type });
    this.resetOtherTabs();
    this.refreshSelects();
    this.refreshStats();
    this._clearNodeEdit();
    this.renderLog();
    showToast(`🗑️ 已删除节点「${name}」及 ${affectedEdges} 条关联边`);
  },

  _saveEdge() {
    const edgeId = document.getElementById("t11-edit-edge-sel").value;
    const edge = G.edges.find(e => e.id === edgeId);
    if (!edge) return;
    edge.type = document.getElementById("t11-edit-edge-type").value;
    edge.weight = parseInt(document.getElementById("t11-edit-edge-weight").value) || 1;
    const sn = nodeById(edge.source), tn = nodeById(edge.target);
    const label = (sn?.name||edge.source) + " → " + (tn?.name||edge.target);
    this.log.unshift({ kind:"edge", action:"edit", id:edgeId, name:`${label} [${edge.type}]`, type:"" });
    this.resetOtherTabs();
    this.refreshStats();
    this._loadEdgeForEdit(edgeId);
    this.renderLog();
    showToast("✅ 边已更新");
  },

  _deleteEdge() {
    const edgeId = document.getElementById("t11-edit-edge-sel").value;
    const edge = G.edges.find(e => e.id === edgeId);
    if (!edge) return;
    const sn = nodeById(edge.source), tn = nodeById(edge.target);
    const label = (sn?.name||edge.source) + " → " + (tn?.name||edge.target);
    if (!confirm(`确认删除边「${label}」？`)) return;
    G.edges = G.edges.filter(e => e.id !== edgeId);
    this.log.unshift({ kind:"edge", action:"delete", id:edgeId, name:label, type:"" });
    this.resetOtherTabs();
    this.refreshStats();
    this._clearEdgeEdit();
    this.renderLog();
    showToast(`🗑️ 已删除边「${label}」`);
  },

  renderLog() {
    const el = document.getElementById("t11-log");
    if (this.log.length === 0) { el.innerHTML = '<div style="color:#64748b;font-size:13px;">暂无操作记录</div>'; return; }
    const actionLabel = { add: "新增", edit: "编辑", delete: "删除" };
    const actionBg = { add: null, edit: "#f59e0b", delete: "#ef4444" };
    el.innerHTML = this.log.slice(0, 50).map((item, i) => {
      const typeColor = item.kind === "node" ? (COLORS[item.type] || "#64748b") : "#64748b";
      const bg = actionBg[item.action] || typeColor;
      const badge = (actionLabel[item.action] || item.action) + (item.kind === "node" ? "节点" : "边");
      const showDel = item.action === "add";
      return `<div class="t11-log-item">
        <span><span class="type-badge" style="background:${bg}">${badge}</span>${esc(item.name)}</span>
        ${showDel ? `<button class="t11-btn-del" data-kind="${item.kind}" data-id="${esc(item.id)}" data-idx="${i}">撤销</button>` : ''}
      </div>`;
    }).join("");
    // Bind undo-delete (only for "add" log entries)
    el.querySelectorAll(".t11-btn-del").forEach(btn => {
      btn.onclick = () => {
        const kind = btn.dataset.kind;
        const id = btn.dataset.id;
        if (kind === "node") {
          G.nodes = G.nodes.filter(n => n.id !== id);
          G.edges = G.edges.filter(e => e.source !== id && e.target !== id);
          _nodeMap.delete(id);
        } else {
          G.edges = G.edges.filter(e => e.id !== id);
        }
        T11.log.splice(parseInt(btn.dataset.idx), 1);
        T11.resetOtherTabs();
        T11.refreshSelects();
        T11.refreshEditSelects();
        T11.refreshStats();
        T11.renderLog();
      };
    });
  }
};

// ════════════════════════════════════════════════════════════════════════
// Tab 12: 创作灵感生成器 (增强版)
// ════════════════════════════════════════════════════════════════════════
const T12 = {
  inited: false,
  // 随机生成状态
  locked: { genre: false, catharsis: false, technique: false, archetype: false, conflict_pattern: false },
  lastPick: { genre: [], catharsis: [], technique: [], archetype: [], conflict_pattern: [] },
  ICONS: { genre: "\u{1F3AD}", catharsis: "\u{1F4A5}", technique: "\u270D", twist: "\u{1F504}", setting: "\u{1F30D}", archetype: "\u{1F9D1}", conflict_pattern: "\u2694" },
  // 手动搭配状态
  manualSelected: new Set(),
  // 节拍编排状态
  beatFocusSlot: null,
  beatTemplate: null,
  beatSlotNodes: [],
  // 收藏库
  VAULT_KEY: "t12_vault_v1",

  // ── 通用工具 ──────────────────────────────────────────────────────────
  _weightedSample(pool, k) {
    if (!pool.length) return [];
    k = Math.min(k, pool.length);
    const result = [], used = new Set();
    let attempts = 0;
    while (result.length < k && attempts < 300) {
      attempts++;
      const totalW = pool.reduce((s, n) => s + Math.max(1, wDegree[n.id] || 1), 0);
      let r = Math.random() * totalW;
      for (const n of pool) {
        r -= Math.max(1, wDegree[n.id] || 1);
        if (r <= 0 && !used.has(n.id)) { result.push(n); used.add(n.id); break; }
      }
    }
    if (result.length < k) {
      for (const n of pool) { if (!used.has(n.id) && result.length < k) { result.push(n); used.add(n.id); } }
    }
    return result;
  },

  _synergyScore(nodeIds) {
    const n = nodeIds.length;
    if (n < 2) return 0;
    const possible = n * (n - 1) / 2;
    const idSet = new Set(nodeIds);
    let actual = 0;
    G.edges.forEach(e => { if (idSet.has(e.source) && idSet.has(e.target)) actual++; });
    return Math.round((actual / possible) * 100);
  },

  _scoreLabel(score) {
    return score > 50 ? "\u2B50\u2B50\u2B50 \u9AD8\u5EA6\u5951\u5408" : score > 20 ? "\u2B50\u2B50 \u6709\u5173\u8054" : "\u2B50 \u72EC\u7ACB\u53D1\u5C55";
  },

  _scoreColor(score) {
    return score > 50 ? "#10b981" : score > 20 ? "#f59e0b" : "#64748b";
  },

  _recipeText(nodes, title) {
    const lines = [title || "\u521B\u4F5C\u914D\u65B9", "=".repeat(28)];
    const byType = {};
    nodes.forEach(n => { (byType[n.type] = byType[n.type] || []).push(n); });
    ["genre","catharsis","technique","twist","setting","archetype","beat","conflict_pattern"].forEach(t => {
      if (!byType[t]) return;
      byType[t].forEach(n => {
        lines.push(`${this.ICONS[t] || "\u2022"} [${TL[t]||t}] ${n.name}`);
        if (n.description) lines.push(`   ${n.description}`);
      });
    });
    return lines.join("\n");
  },

  // ── 随机生成 ──────────────────────────────────────────────────────────
  _generate() {
    const gc = parseInt(document.getElementById("t12-genre-count").value) || 1;
    const cc = parseInt(document.getElementById("t12-catharsis-count").value) || 2;
    const tc = parseInt(document.getElementById("t12-technique-count").value) || 1;
    const byType = t => G.nodes.filter(n => n.type === t);
    if (!this.locked.genre)             this.lastPick.genre             = this._weightedSample(byType("genre"), gc);
    if (!this.locked.catharsis)         this.lastPick.catharsis         = this._weightedSample(byType("catharsis"), cc);
    if (!this.locked.technique)         this.lastPick.technique         = this._weightedSample(byType("technique"), tc);
    if (!this.locked.archetype)         this.lastPick.archetype         = this._weightedSample(byType("archetype"), 1);
    if (!this.locked.conflict_pattern)  this.lastPick.conflict_pattern  = this._weightedSample(byType("conflict_pattern"), 1);
    this._render();
    ["t12-new","t12-lock-row","t12-compare-btn","t12-save-rand"].forEach(id => {
      document.getElementById(id).style.display = "";
    });
  },

  _render() {
    const container = document.getElementById("t12-output");
    const allPicks = [...this.lastPick.genre, ...this.lastPick.catharsis, ...this.lastPick.technique, ...this.lastPick.archetype, ...this.lastPick.conflict_pattern];
    const score = this._synergyScore(allPicks.map(n => n.id));
    const sc = this._scoreColor(score);
    const sections = [
      { key:"genre",             label:"\u9898\u6750", color:COLORS.genre },
      { key:"catharsis",         label:"\u723D\u611F", color:COLORS.catharsis },
      { key:"technique",         label:"\u6280\u5DE7", color:COLORS.technique },
      { key:"archetype",         label:"\u89D2\u8272\u539F\u578B", color:COLORS.archetype },
      { key:"conflict_pattern",  label:"\u51B2\u7A81\u6A21\u5F0F", color:COLORS.conflict_pattern },
    ];
    let html = `<div class="t12-recipe" style="max-width:620px">
      <h4>\u{1F3B2} \u672C\u6B21\u521B\u4F5C\u914D\u65B9 <span style="font-size:12px;color:#64748b;font-weight:normal">(\u57FA\u4E8E\u6743\u91CD\u968F\u673A)</span></h4>`;
    for (const sec of sections) {
      for (const n of (this.lastPick[sec.key] || [])) {
        html += `<div class="t12-item">
          <div class="t12-icon">${this.ICONS[sec.key]}</div>
          <div class="t12-info">
            <div class="t12-name" style="color:${sec.color}">[${sec.label}] ${esc(n.name)}</div>
            ${n.description ? `<div class="t12-desc">${esc(n.description)}</div>` : ""}
            ${(n.tags||[]).length ? `<div style="margin-top:4px">${n.tags.map(t=>`<span style="font-size:11px;background:#334155;padding:2px 6px;border-radius:8px;color:#94a3b8;margin-right:4px">${esc(t)}</span>`).join("")}</div>` : ""}
          </div></div>`;
      }
    }
    html += `<div class="t12-synergy-bar"><div class="t12-synergy-score">\u76F8\u6027\u5206: <span style="color:${sc};font-weight:700">${score}%</span> &nbsp;<span style="font-size:11px;color:#475569">${this._scoreLabel(score)}</span></div></div></div>`;
    container.innerHTML = html;
  },

  _renderCompare() {
    const container = document.getElementById("t12-output");
    const gc = parseInt(document.getElementById("t12-genre-count").value) || 1;
    const cc = parseInt(document.getElementById("t12-catharsis-count").value) || 2;
    const tc = parseInt(document.getElementById("t12-technique-count").value) || 1;
    const byType = t => G.nodes.filter(n => n.type === t);
    const sections = [
      { key:"genre",             label:"\u9898\u6750", color:COLORS.genre },
      { key:"catharsis",         label:"\u723D\u611F", color:COLORS.catharsis },
      { key:"technique",         label:"\u6280\u5DE7", color:COLORS.technique },
      { key:"archetype",         label:"\u89D2\u8272\u539F\u578B", color:COLORS.archetype },
      { key:"conflict_pattern",  label:"\u51B2\u7A81\u6A21\u5F0F", color:COLORS.conflict_pattern },
    ];
    let html = "";
    for (let i = 0; i < 3; i++) {
      const r = {
        genre:     this._weightedSample(byType("genre"), gc),
        catharsis: this._weightedSample(byType("catharsis"), cc),
        technique: this._weightedSample(byType("technique"), tc),
        archetype: this._weightedSample(byType("archetype"), 1),
        conflict_pattern: this._weightedSample(byType("conflict_pattern"), 1),
      };
      const allNodes = [...r.genre, ...r.catharsis, ...r.technique, ...r.archetype, ...r.conflict_pattern];
      const score = this._synergyScore(allNodes.map(n => n.id));
      const sc = this._scoreColor(score);
      html += `<div class="t12-recipe">
        <h4>\u65B9\u6848 ${i+1} <span style="font-size:12px;font-weight:normal;color:${sc}">\u76F8\u6027 ${score}%</span></h4>`;
      for (const sec of sections) {
        for (const n of r[sec.key]) {
          html += `<div class="t12-item">
            <div class="t12-icon">${this.ICONS[sec.key]}</div>
            <div class="t12-info">
              <div class="t12-name" style="color:${sec.color}">[${sec.label}] ${esc(n.name)}</div>
              ${n.description ? `<div class="t12-desc">${esc(n.description)}</div>` : ""}
            </div></div>`;
        }
      }
      html += `</div>`;
    }
    container.innerHTML = html;
  },

  _updateLockButtons() {
    ["genre","catharsis","technique"].forEach(key => {
      const btn = document.getElementById(`t12-lock-${key}`);
      btn.classList.toggle("locked", this.locked[key]);
    });
  },

  // ── 手动搭配 ──────────────────────────────────────────────────────────
  _initManual() {
    const typeColors = { genre:COLORS.genre, catharsis:COLORS.catharsis, technique:COLORS.technique, setting:COLORS.setting };
    ["genre","catharsis","technique","setting"].forEach(t => {
      const wrap = document.getElementById(`t12-chips-${t}`);
      if (!wrap) return;
      G.nodes.filter(n => n.type === t).forEach(n => {
        const chip = document.createElement("span");
        chip.className = "t12-chip";
        chip.textContent = n.name;
        chip.dataset.id = n.id;
        chip.style.borderColor = (typeColors[t] || "#334155") + "55";
        chip.addEventListener("click", () => {
          if (this.manualSelected.has(n.id)) {
            this.manualSelected.delete(n.id);
            chip.classList.remove("selected");
            chip.style.borderColor = (typeColors[t] || "#334155") + "55";
          } else {
            this.manualSelected.add(n.id);
            chip.classList.add("selected");
            chip.style.borderColor = typeColors[t] || "#8b5cf6";
          }
          this._renderSynergy();
        });
        wrap.appendChild(chip);
      });
    });
    document.getElementById("t12-manual-save").addEventListener("click", () => {
      const nodes = [...this.manualSelected].map(id => nodeById(id)).filter(Boolean);
      if (!nodes.length) { showToast("\u8BF7\u5148\u9009\u62E9\u8282\u70B9"); return; }
      this._saveToVault(nodes, "\u624B\u52A8\u642D\u914D");
    });
    document.getElementById("t12-manual-clear").addEventListener("click", () => {
      this.manualSelected.clear();
      document.querySelectorAll(".t12-chip.selected").forEach(c => {
        c.classList.remove("selected");
        const t = nodeById(c.dataset.id)?.type;
        c.style.borderColor = (typeColors[t] || "#334155") + "55";
      });
      this._renderSynergy();
    });
  },

  _renderSynergy() {
    const nodeIds = [...this.manualSelected];
    const nodes = nodeIds.map(id => nodeById(id)).filter(Boolean);
    const svg = document.getElementById("t12-synergy-svg");
    const scoreBox = document.getElementById("t12-synergy-text");
    if (!svg) return;

    if (nodes.length === 0) {
      svg.innerHTML = '<text x="50%" y="50%" text-anchor="middle" fill="#334155" font-size="13">\u9009\u62E9\u8282\u70B9\u540E\u663E\u793A\u76F8\u6027\u56FE</text>';
      scoreBox.innerHTML = '<span style="color:#475569">\u70B9\u51FB\u8282\u70B9\u82AF\u7247\u9009\u62E9\u8282\u70B9\u540E\u67E5\u770B\u76F8\u6027\u5206\u6790</span>';
      return;
    }

    const idSet = new Set(nodeIds);
    const links = G.edges.filter(e => idSet.has(e.source) && idSet.has(e.target));
    const score = this._synergyScore(nodeIds);
    const sc = this._scoreColor(score);
    scoreBox.innerHTML = `\u76F8\u6027\u5206: <span style="color:${sc};font-weight:700">${score}%</span> &nbsp;|\u2003\u8282\u70B9 ${nodes.length} \u4E2A &nbsp;|\u2003\u5173\u8054\u8FB9 ${links.length} \u6761 &nbsp;|\u2003<span style="color:#64748b">${this._scoreLabel(score)}</span>`;

    const W = svg.clientWidth || 280, H = svg.clientHeight || W;
    svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
    svg.innerHTML = "";

    // Static D3 force layout (pre-tick for stability)
    const simNodes = nodes.map(n => ({ ...n, x: W/2 + (Math.random()-.5)*80, y: H/2 + (Math.random()-.5)*80 }));
    const simMap = new Map(simNodes.map(n => [n.id, n]));
    const simLinks = links.map(e => ({ source: simMap.get(e.source), target: simMap.get(e.target) })).filter(l => l.source && l.target);

    const sim = d3.forceSimulation(simNodes)
      .force("link", d3.forceLink(simLinks).distance(65).strength(0.8))
      .force("charge", d3.forceManyBody().strength(-90))
      .force("center", d3.forceCenter(W/2, H/2))
      .force("collision", d3.forceCollide(26))
      .stop();
    for (let i = 0; i < 150; i++) sim.tick();

    const ns = "http://www.w3.org/2000/svg";
    // Edges
    simLinks.forEach(l => {
      const line = document.createElementNS(ns, "line");
      line.setAttribute("x1", l.source.x); line.setAttribute("y1", l.source.y);
      line.setAttribute("x2", l.target.x); line.setAttribute("y2", l.target.y);
      line.setAttribute("stroke", "#334155"); line.setAttribute("stroke-width", "1.5");
      svg.appendChild(line);
    });
    // Nodes
    simNodes.forEach(n => {
      const g = document.createElementNS(ns, "g");
      const cx = Math.max(18, Math.min(W-18, n.x)), cy = Math.max(18, Math.min(H-18, n.y));
      const circle = document.createElementNS(ns, "circle");
      circle.setAttribute("cx", cx); circle.setAttribute("cy", cy);
      circle.setAttribute("r", 14); circle.setAttribute("fill", (COLORS[n.type]||"#64748b")+"33");
      circle.setAttribute("stroke", COLORS[n.type]||"#64748b"); circle.setAttribute("stroke-width", "2");
      g.appendChild(circle);
      const label = document.createElementNS(ns, "text");
      label.setAttribute("x", cx); label.setAttribute("y", cy+4);
      label.setAttribute("text-anchor", "middle"); label.setAttribute("font-size", "9.5");
      label.setAttribute("fill", "#e2e8f0");
      label.textContent = n.name.length > 5 ? n.name.slice(0,5) + "\u2026" : n.name;
      g.appendChild(label);
      svg.appendChild(g);
    });
  },

  // ── 节拍编排器 ────────────────────────────────────────────────────────
  BEAT_TEMPLATES: {
    "313": { name: "\u4E09\u4E00\u4E09 (3-1-3)", slots: [
      { name: "\u5F00\u5C40\u94FA\u57AB\u2460", hint: "\u5EFA\u7ACB\u4E16\u754C\u89C2\uFF0C\u4ECB\u7ECD\u4E3B\u89D2\u80CC\u666F", hint_types: ["genre","setting"] },
      { name: "\u5F00\u5C40\u94FA\u57AB\u2461", hint: "\u4E3B\u89D2\u9047\u5230\u56F0\u5883\uFF0F\u6311\u6218\u51FA\u73B0", hint_types: ["twist"] },

  _initBeat() {
    document.getElementById("t12-beat-apply").addEventListener("click", () => {
      const key = document.getElementById("t12-beat-tpl").value;
      this.beatTemplate = this.BEAT_TEMPLATES[key];
      this.beatSlotNodes = this.beatTemplate.slots.map(() => []);
      this.beatFocusSlot = null;
      this._renderBeatBoard();
      this._renderBeatChips();
    });
    document.getElementById("t12-beat-save").addEventListener("click", () => {
      if (!this.beatTemplate) return;
      const allNodes = this.beatSlotNodes.flat();
      if (!allNodes.length) { showToast("\u8BF7\u5148\u5206\u914D\u8282\u70B9\u5230\u69FD\u4F4D"); return; }
      this._saveToVault(allNodes, this.beatTemplate.name + " \u8282\u62CD\u7F16\u6392");
    });
    document.getElementById("t12-beat-clear-all").addEventListener("click", () => {
      if (!this.beatTemplate) return;
      this.beatSlotNodes = this.beatTemplate.slots.map(() => []);
      this.beatFocusSlot = null;
      this._renderBeatBoard();
    });
    // Auto-apply default
    document.getElementById("t12-beat-apply").click();
  },

  _renderBeatBoard() {
    const board = document.getElementById("t12-beat-board");
    if (!this.beatTemplate) { board.innerHTML = '<p style="color:#475569;font-size:13px">\u8BF7\u5148\u9009\u62E9\u6A21\u677F\u5E76\u70B9\u51FB\u201C\u5E94\u7528\u6A21\u677F\u201D</p>'; return; }
    board.innerHTML = "";
    this.beatTemplate.slots.forEach((slot, idx) => {
      const div = document.createElement("div");
      div.className = "t12-beat-slot" + (this.beatFocusSlot === idx ? " focused" : "");
      div.dataset.idx = idx;

      div.innerHTML = `<div class="t12-beat-slot-header">${esc(slot.name)}</div>
        <div class="t12-beat-slot-hint">${esc(slot.hint)}</div>
        <div id="t12-beat-nodes-${idx}"></div>
        ${!this.beatSlotNodes[idx]?.length ? '<div class="t12-beat-slot-empty">\u62D6\u5165\u8282\u70B9</div>' : ""}`;

      // Drag-drop
      div.addEventListener("dragover", e => { e.preventDefault(); div.classList.add("dragover"); });
      div.addEventListener("dragleave", () => div.classList.remove("dragover"));
      div.addEventListener("drop", e => {
        e.preventDefault(); div.classList.remove("dragover");
        const nodeId = e.dataTransfer.getData("text/plain");
        const node = nodeById(nodeId);
        if (!node) return;
        if (!this.beatSlotNodes[idx].find(n => n.id === nodeId)) {
          this.beatSlotNodes[idx].push(node);
          this._renderBeatBoard();
          this._renderBeatChips();
        }
      });
      // Click to focus
      div.addEventListener("click", e => {
        if (e.target.classList.contains("rm")) return;
        this.beatFocusSlot = (this.beatFocusSlot === idx) ? null : idx;
        this._renderBeatBoard();
        this._renderBeatChips();
      });
      board.appendChild(div);

      // Render assigned nodes
      const wrap = document.getElementById(`t12-beat-nodes-${idx}`);
      (this.beatSlotNodes[idx] || []).forEach(n => {
        const chip = document.createElement("div");
        chip.className = "t12-beat-node-chip";
        chip.innerHTML = `<span style="color:${COLORS[n.type]||"#94a3b8"}">${esc(n.name)}</span><span class="rm" data-id="${n.id}" data-idx="${idx}">\xd7</span>`;
        chip.querySelector(".rm").addEventListener("click", ev => {
          ev.stopPropagation();
          const si = parseInt(ev.target.dataset.idx), nid = ev.target.dataset.id;
          this.beatSlotNodes[si] = this.beatSlotNodes[si].filter(nn => nn.id !== nid);
          this._renderBeatBoard();
          this._renderBeatChips();
        });
        wrap.appendChild(chip);
      });
    });
  },

  _renderBeatChips() {
    const wrap = document.getElementById("t12-beat-chips");
    wrap.innerHTML = "";
    // Determine which node types to show based on focused slot's hint_types
    const slot = (this.beatFocusSlot !== null && this.beatTemplate)
      ? this.beatTemplate.slots[this.beatFocusSlot] : null;
    const hintTypes = slot ? new Set(slot.hint_types || []) : null;
    // Already assigned node IDs (across all slots)
    const assignedIds = new Set(this.beatSlotNodes.flat().map(n => n.id));

    // Filter: if a slot is focused, only show matching types; hide already-assigned
    let pool = G.nodes.filter(n => {
      if (assignedIds.has(n.id)) return false;
      if (hintTypes && !hintTypes.has(n.type)) return false;
      return true;
    });

    // Sort: by relevance (degree desc within type groups matching hint_types)
    pool.sort((a, b) => (degree[b.id]||0) - (degree[a.id]||0));

    // Header showing filter status
    if (slot) {
      const header = document.createElement("div");
      header.style.cssText = "width:100%;font-size:11px;color:#8b5cf6;margin-bottom:6px;";
      header.textContent = `${slot.name} 推荐: ${(slot.hint_types||[]).map(t=>TL[t]||t).join("、")} (${pool.length}个)`;
      wrap.appendChild(header);
    } else {
      const header = document.createElement("div");
      header.style.cssText = "width:100%;font-size:11px;color:#475569;margin-bottom:6px;";
      header.textContent = "点击上方槽位以筛选推荐节点";
      wrap.appendChild(header);
    }

    pool.forEach(n => {
      const chip = document.createElement("span");
      chip.className = "t12-beat-src-chip";
      chip.textContent = n.name;
      chip.style.borderColor = (COLORS[n.type] || "#64748b") + "66";
      chip.setAttribute("draggable", "true");
      chip.addEventListener("dragstart", e => {
        e.dataTransfer.setData("text/plain", n.id);
        chip.classList.add("dragging");
      });
      chip.addEventListener("dragend", () => chip.classList.remove("dragging"));
      chip.addEventListener("click", () => {
        if (this.beatFocusSlot === null) { showToast("请先点击目标槽位，再点击节点"); return; }
        const idx = this.beatFocusSlot;
        if (!this.beatSlotNodes[idx].find(nn => nn.id === n.id)) {
          this.beatSlotNodes[idx].push(n);
          this._renderBeatBoard();
          this._renderBeatChips(); // re-render to remove assigned node
        }
      });
      wrap.appendChild(chip);
    });
  },

  // ── 收藏库 ────────────────────────────────────────────────────────────
  _loadVault() {
    try { return JSON.parse(localStorage.getItem(this.VAULT_KEY) || "[]"); } catch { return []; }
  },
  _saveVaultData(items) { localStorage.setItem(this.VAULT_KEY, JSON.stringify(items)); },

  _saveToVault(nodes, label) {
    const name = prompt(`\u7ED9\u8FD9\u4E2A\u914D\u65B9\u8D77\u4E2A\u540D\u5B57 (\u9ED8\u8BA4: ${label}):`, label);
    if (name === null) return;
    const items = this._loadVault();
    items.unshift({
      id: Date.now().toString(),
      name: name.trim() || label,
      nodes: nodes.map(n => n.id),
      date: new Date().toLocaleDateString("zh-CN"),
      label,
    });
    this._saveVaultData(items);
    showToast(`\u5DF2\u4FDD\u5B58\u300C${name.trim() || label}\u300D\u5230\u6536\u85CF\u5E93`);
    if (document.getElementById("t12-sub-vault")?.classList.contains("active")) this._renderVault();
  },

  _renderVault() {
    const items = this._loadVault();
    const list = document.getElementById("t12-vault-list");
    if (!items.length) {
      list.innerHTML = '<div id="t12-vault-empty">\u6682\u65E0\u6536\u85CF \u2014 \u5728\u968F\u673A\u751F\u6210\u6216\u624B\u52A8\u642D\u914D\u4E2D\u70B9\u51FB\u300C\u{1F4BE} \u6536\u85CF\u300D\u5373\u53EF\u4FDD\u5B58\u914D\u65B9</div>';
      return;
    }
    list.innerHTML = items.map(item => {
      const nodes = item.nodes.map(id => nodeById(id)).filter(Boolean);
      const byType = {};
      nodes.forEach(n => { (byType[n.type] = byType[n.type] || []).push(n.name); });
      const tagStr = Object.entries(byType).map(([t, ns]) =>
        `${TL[t]||t}: ${ns.slice(0,3).join("/")}${ns.length>3?"\u2026":""}`).join(" \u00B7 ");
      return `<div class="t12-vault-item">
        <div class="t12-vault-item-body">
          <div class="t12-vault-item-name">${esc(item.name)}</div>
          <div class="t12-vault-item-tags">${tagStr}</div>
          <div class="t12-vault-item-date">${item.date} \u00B7 ${item.label}</div>
        </div>
        <div class="t12-vault-actions">
          <button class="t12-vault-btn" data-action="copy" data-id="${item.id}">\u{1F4CB} \u590D\u5236</button>
          <button class="t12-vault-btn danger" data-action="del" data-id="${item.id}">\u{1F5D1}</button>
        </div></div>`;
    }).join("");
    list.querySelectorAll("[data-action]").forEach(btn => {
      btn.addEventListener("click", () => {
        const { action, id } = btn.dataset;
        const allItems = this._loadVault();
        const item = allItems.find(i => i.id === id);
        if (!item) return;
        if (action === "del") {
          this._saveVaultData(allItems.filter(i => i.id !== id));
          this._renderVault();
        } else if (action === "copy") {
          const nodes = item.nodes.map(i => nodeById(i)).filter(Boolean);
          const text = this._recipeText(nodes, item.name);
          navigator.clipboard?.writeText(text).then(() => showToast("\u5DF2\u590D\u5236\u5230\u526A\u8D34\u677F")).catch(() => showToast("\u590D\u5236\u5931\u8D25\uFF0C\u8BF7\u624B\u52A8\u590D\u5236"));
        }
      });
    });
  },

  // ── Sub-nav ───────────────────────────────────────────────────────────
  _initSubNav() {
    document.querySelectorAll(".t12-sub-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".t12-sub-btn").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".t12-sub-page").forEach(p => p.classList.remove("active"));
        btn.classList.add("active");
        const page = document.getElementById(btn.dataset.sub);
        if (page) page.classList.add("active");
        if (btn.dataset.sub === "t12-sub-vault")  this._renderVault();
        if (btn.dataset.sub === "t12-sub-manual") requestAnimationFrame(() => this._renderSynergy());
      });
    });
  },

  // ── Main init ─────────────────────────────────────────────────────────
  init() {
    this.inited = true;
    this._initSubNav();
    // 随机生成
    document.getElementById("t12-gen").addEventListener("click", () => this._generate());
    document.getElementById("t12-new").addEventListener("click", () => this._generate());
    document.getElementById("t12-compare-btn").addEventListener("click", () => this._renderCompare());
    document.getElementById("t12-save-rand").addEventListener("click", () => {
      const all = [...this.lastPick.genre, ...this.lastPick.catharsis, ...this.lastPick.technique];
      if (!all.length) return;
      this._saveToVault(all, "\u968F\u673A\u914D\u65B9");
    });
    ["genre","catharsis","technique"].forEach(key => {
      document.getElementById(`t12-lock-${key}`).addEventListener("click", () => {
        this.locked[key] = !this.locked[key];
        this._updateLockButtons();
      });
    });
    // 手动搭配
    this._initManual();
    // 节拍编排
    this._initBeat();
    // 收藏库工具栏
    document.getElementById("t12-vault-export").addEventListener("click", () => {
      const items = this._loadVault();
      if (!items.length) { showToast("\u6536\u85CF\u5E93\u4E3A\u7A7A"); return; }
      const text = items.map(item => {
        const nodes = item.nodes.map(id => nodeById(id)).filter(Boolean);
        return this._recipeText(nodes, item.name);
      }).join("\n\n" + "\u2500".repeat(28) + "\n\n");
      navigator.clipboard?.writeText(text)
        .then(() => showToast(`\u5DF2\u590D\u5236 ${items.length} \u4E2A\u914D\u65B9\u5230\u526A\u8D34\u677F`))
        .catch(() => showToast("\u590D\u5236\u5931\u8D25"));
    });
    document.getElementById("t12-vault-clear-all").addEventListener("click", () => {
      if (confirm("\u786E\u5B9A\u6E05\u7A7A\u6240\u6709\u6536\u85CF\uFF1F\u6B64\u64CD\u4F5C\u4E0D\u53EF\u6062\u590D\u3002")) {
        localStorage.removeItem(this.VAULT_KEY);
        this._renderVault();
      }
    });
    // Export buttons
    document.getElementById("t12-export-prompt").addEventListener("click", () => this._exportPrompt());
    document.getElementById("t12-export-md").addEventListener("click", () => this._exportMarkdown());
  },

  _gatherComposition() {
    // Collect current composition from random picks, manual selection, and beat arrangement
    const nodes = [];
    // From random generation
    ["genre","catharsis","technique","archetype","conflict_pattern"].forEach(k => {
      (this.lastPick[k] || []).forEach(n => { if (!nodes.find(x => x.id === n.id)) nodes.push(n); });
    });
    // From manual selection
    this.manualSelected.forEach(id => {
      const n = nodeById(id);
      if (n && !nodes.find(x => x.id === n.id)) nodes.push(n);
    });
    // From beat slots
    (this.beatSlotNodes || []).forEach(slot => {
      (slot || []).forEach(id => {
        const n = nodeById(id);
        if (n && !nodes.find(x => x.id === n.id)) nodes.push(n);
      });
    });
    return nodes;
  },

  _exportPrompt() {
    const nodes = this._gatherComposition();
    if (!nodes.length) { showToast("\u5F53\u524D\u65E0\u914D\u65B9\u6570\u636E\uFF0C\u8BF7\u5148\u751F\u6210\u6216\u642D\u914D"); return; }
    const byType = {};
    nodes.forEach(n => { (byType[n.type] = byType[n.type] || []).push(n); });
    const lines = [
      "# LLM \u5199\u4F5C Prompt",
      "",
      "\u8BF7\u6839\u636E\u4EE5\u4E0B\u53D9\u4E8B\u914D\u65B9\u64B0\u5199\u4E00\u7BC7\u6545\u4E8B\uFF1A",
      ""
    ];
    const typeOrder = ["genre","catharsis","technique","twist","setting","archetype","beat","conflict_pattern","antagonist_pattern","character_arc","power_system","engagement_mechanic","format","work_reference"];
    typeOrder.forEach(t => {
      if (!byType[t] || !byType[t].length) return;
      lines.push(`## ${TL[t] || t}`);
      byType[t].forEach(n => {
        lines.push(`- ${n.name}${n.description ? ": " + n.description : ""}`);
      });
      lines.push("");
    });
    lines.push("\u8BF7\u5728\u6545\u4E8B\u4E2D\u5145\u5206\u8FD0\u7528\u4EE5\u4E0A\u5143\u7D20\uFF0C\u6CE8\u610F\u8282\u594F\u63A7\u5236\u548C\u60C5\u611F\u5F20\u529B\u3002");
    const text = lines.join("\n");
    const blob = new Blob([text], {type: "text/plain;charset=utf-8"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "narrative_prompt_" + new Date().toISOString().slice(0,10) + ".txt";
    a.click();
    URL.revokeObjectURL(a.href);
    showToast("\u5DF2\u5BFC\u51FA Prompt \u6587\u4EF6");
  },

  _exportMarkdown() {
    const nodes = this._gatherComposition();
    if (!nodes.length) { showToast("\u5F53\u524D\u65E0\u914D\u65B9\u6570\u636E\uFF0C\u8BF7\u5148\u751F\u6210\u6216\u642D\u914D"); return; }
    const byType = {};
    nodes.forEach(n => { (byType[n.type] = byType[n.type] || []).push(n); });
    const allIds = new Set(nodes.map(n => n.id));
    const relevantEdges = G.edges.filter(e => allIds.has(e.source) && allIds.has(e.target));
    const lines = [
      "# \u53D9\u4E8B\u914D\u65B9\u84DD\u56FE",
      "",
      `> \u751F\u6210\u65F6\u95F4: ${new Date().toLocaleString("zh-CN")}`,
      ""
    ];
    const typeOrder = ["genre","catharsis","technique","twist","setting","archetype","beat","conflict_pattern","antagonist_pattern","character_arc","power_system","engagement_mechanic","format","work_reference"];
    typeOrder.forEach(t => {
      if (!byType[t] || !byType[t].length) return;
      lines.push(`## ${TL[t] || t}`);
      lines.push("");
      byType[t].forEach(n => {
        lines.push(`### ${n.name}`);
        if (n.description) lines.push(`${n.description}`);
        if (n.tags && n.tags.length) lines.push(`\u6807\u7B7E: ${n.tags.join(", ")}`);
        lines.push("");
      });
    });
    if (relevantEdges.length) {
      lines.push("## \u5143\u7D20\u5173\u7CFB");
      lines.push("");
      lines.push("| \u6E90 | \u5173\u7CFB | \u76EE\u6807 |");
      lines.push("|------|------|------|");
      relevantEdges.forEach(e => {
        const s = nodeById(e.source), t2 = nodeById(e.target);
        if (s && t2) lines.push(`| ${s.name} | ${e.type} | ${t2.name} |`);
      });
      lines.push("");
    }
    const score = this._synergyScore(nodes.map(n => n.id));
    lines.push(`---`);
    lines.push(`\u76F8\u6027\u5206: **${score}%** ${this._scoreLabel(score)}`);
    const text = lines.join("\n");
    const blob = new Blob([text], {type: "text/markdown;charset=utf-8"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "narrative_blueprint_" + new Date().toISOString().slice(0,10) + ".md";
    a.click();
    URL.revokeObjectURL(a.href);
    showToast("\u5DF2\u5BFC\u51FA Markdown \u84DD\u56FE");
  }
};

const T14 = {

    const archetypes = G.nodes.filter(n => n.type === "archetype");

      if (!groups[rf]) groups[rf] = [];
      groups[rf].push(a);
    });

    const container = document.getElementById("t14-content");
    if (archetypes.length === 0) {
      container.innerHTML = '<div style="color:#64748b;padding:20px">暂无角色原型数据</div>';
      return;
    }

    const roleLabels = {protagonist:"主角",antagonist_major:"主要反派",antagonist_minor:"踏脚石反派",mentor:"导师/贵人",sidekick:"伙伴/随从",love_interest:"感情线角色",comic_relief:"搞笑担当",system_guide:"系统/引导","其他":"其他"};
    const roleOrder = ["protagonist","antagonist_major","antagonist_minor","mentor","sidekick","love_interest","comic_relief","system_guide","其他"];
    let html = '';
    const sortedGroups = Object.keys(groups).sort((a,b) => (roleOrder.indexOf(a)===-1?99:roleOrder.indexOf(a)) - (roleOrder.indexOf(b)===-1?99:roleOrder.indexOf(b)));
    for (const rf of sortedGroups) {
      const rfLabel = roleLabels[rf] || rf;

        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px">`;
      for (const a of groups[rf]) {
        // Find connected catharsis via archetype_enables_catharsis
        const connCatharsis = [];

        G.edges.forEach(e => {
          if (e.source === a.id && e.type === "archetype_enables_catharsis") {
            const nd = nodeById(e.target);
            if (nd) connCatharsis.push(nd);
          }
          if (e.target === a.id && e.type === "archetype_enables_catharsis") {
            const nd = nodeById(e.source);
            if (nd) connCatharsis.push(nd);
          }
          if (e.source === a.id && e.type === "archetype_serves_in_genre") {
            const nd = nodeById(e.target);
            if (nd) connGenres.push(nd);
          }
          if (e.target === a.id && e.type === "archetype_serves_in_genre") {
            const nd = nodeById(e.source);
            if (nd) connGenres.push(nd);
          }
        });

        const descHtml = a.description ? `<div style="color:#94a3b8;font-size:13px;line-height:1.5;margin:6px 0">${esc(a.description)}</div>` : "";
        const tagsHtml = (a.tags||[]).length ? `<div style="margin:4px 0">${a.tags.map(t=>`<span class="tag-chip">${esc(t)}</span>`).join("")}</div>` : "";

        let connHtml = "";
        if (connGenres.length) {
          connHtml += `<div class="recipe-section"><h4>适用题材</h4>${connGenres.map(g => `<span class="recipe-item" style="background:${COLORS.genre}33;color:${COLORS.genre}">${esc(g.name)}</span>`).join("")}</div>`;
        }
        if (connCatharsis.length) {
          connHtml += `<div class="recipe-section"><h4>触发爽点</h4>${connCatharsis.map(c => `<span class="recipe-item" style="background:${COLORS.catharsis}33;color:${COLORS.catharsis}">${esc(c.name)}</span>`).join("")}</div>`;
        }

        html += `<div class="card">
          <h4 style="color:${COLORS.archetype};font-size:15px">${esc(a.name)}</h4>
          ${descHtml}${tagsHtml}${connHtml}
        </div>`;
      }
      html += `</div></div>`;
    }
    container.innerHTML = html;
  }

// Tab 15: Beat 时间轴 (Beat Timeline)
// ════════════════════════════════════════════════════════════════════════
const T15 = {
  inited: false,
  beatCatLabels: {hook:"钩子",setup:"铺垫",escalation:"升级",midpoint:"中点",crisis:"危机",climax:"高潮",resolution:"收束"},
  init() {
    this.inited = true;
    this.render();
  },
  render() {
    const beats = G.nodes.filter(n => n.type === "beat");
    if (beats.length === 0) {
      document.getElementById("t15-timeline-wrap").innerHTML = '<div style="color:#64748b;padding:20px">暂无叙事节拍数据</div>';
      return;
    }

    // Separate timeline beats from cycle beats
    const timelineBeats = beats.filter(b => (b.position_pct !== undefined && b.position_pct !== -1));
    const cycleBeats = beats.filter(b => (b.position_pct === undefined || b.position_pct === -1));

    // Color by beat_category
    const beatCatLabels = this.beatCatLabels;
    const categories = [...new Set(beats.map(b => b.beat_category || "默认"))];
    const catColors = {};
    const palette = ["#f97316","#f59e0b","#10b981","#3b82f6","#8b5cf6","#ec4899","#06b6d4","#ef4444"];
    categories.forEach((c, i) => { catColors[c] = palette[i % palette.length]; });

    // SVG timeline
    const W = 1100, H = 280, PAD = 60, TRACK_Y = 160;
    const wrap = document.getElementById("t15-timeline-wrap");

    let svg = `<svg width="100%" viewBox="0 0 ${W} ${H}" style="max-width:${W}px;background:#1e293b;border-radius:10px;border:1px solid #334155">`;
    // Timeline axis
    svg += `<line x1="${PAD}" y1="${TRACK_Y}" x2="${W-PAD}" y2="${TRACK_Y}" stroke="#475569" stroke-width="2"/>`;
    // Tick marks
    for (let p = 0; p <= 100; p += 10) {
      const x = PAD + (W - 2*PAD) * (p / 100);
      svg += `<line x1="${x}" y1="${TRACK_Y-6}" x2="${x}" y2="${TRACK_Y+6}" stroke="#64748b" stroke-width="1"/>`;
      svg += `<text x="${x}" y="${TRACK_Y+22}" fill="#64748b" font-size="11" text-anchor="middle">${p}%</text>`;
    }
    // Beat nodes on timeline
    const sorted = timelineBeats.sort((a, b) => (a.position_pct||0) - (b.position_pct||0));
    sorted.forEach((b, i) => {
      const pct = b.position_pct || 0;
      const x = PAD + (W - 2*PAD) * (pct <= 1 ? pct : pct / 100);
      const cat = b.beat_category || "默认";
      const col = catColors[cat];
      const levels = [-24, -42, -60, -78, -96, -114];
      const yOff = levels[i % levels.length];
      svg += `<line x1="${x}" y1="${TRACK_Y-8}" x2="${x}" y2="${TRACK_Y + yOff + 14}" stroke="${col}" stroke-width="1" opacity="0.4"/>`;
      svg += `<circle cx="${x}" cy="${TRACK_Y}" r="7" fill="${col}" stroke="#0f172a" stroke-width="2" style="cursor:pointer" data-beat-id="${esc(b.id)}"/>`;
      svg += `<text x="${x}" y="${TRACK_Y + yOff}" fill="#e2e8f0" font-size="11" text-anchor="middle" font-weight="600" style="pointer-events:none">${esc(b.name)}</text>`;
    });
    // Legend
    let lx = PAD;
    categories.forEach(cat => {
      const catLabel = beatCatLabels[cat] || cat;
      svg += `<rect x="${lx}" y="${H-24}" width="10" height="10" rx="2" fill="${catColors[cat]}"/>`;
      svg += `<text x="${lx+14}" y="${H-15}" fill="#94a3b8" font-size="11">${esc(catLabel)}</text>`;
      lx += catLabel.length * 14 + 28;
    });
    svg += `</svg>`;
    wrap.innerHTML = svg;

    // Click handler for beat nodes
    wrap.querySelectorAll("circle[data-beat-id]").forEach(circle => {
      circle.addEventListener("click", () => {
        const beatId = circle.getAttribute("data-beat-id");
        this.showBeatDetail(beatId);
      });
    });

    // Cycle beats section
    const cycleSection = document.getElementById("t15-cycle-section");
    if (cycleBeats.length > 0) {
      let cHtml = `<h3 style="color:#f97316;font-size:15px;margin-bottom:12px">&#x1F504; 循环节拍</h3>
        <div style="display:flex;flex-wrap:wrap;gap:8px">`;
      cycleBeats.forEach(b => {
        const cat = b.beat_category || "默认";
        const col = catColors[cat];
        cHtml += `<div class="card" style="cursor:pointer;border-color:${col}44;min-width:140px" data-cycle-beat-id="${esc(b.id)}">
          <div style="font-size:14px;color:${col};font-weight:600">${esc(b.name)}</div>
          ${b.description ? `<div style="font-size:12px;color:#94a3b8;margin-top:4px">${esc(b.description).slice(0,60)}</div>` : ""}
        </div>`;
      });
      cHtml += `</div>`;
      cycleSection.innerHTML = cHtml;
      cycleSection.querySelectorAll("[data-cycle-beat-id]").forEach(el => {
        el.addEventListener("click", () => {
          this.showBeatDetail(el.getAttribute("data-cycle-beat-id"));
        });
      });
    } else {
      cycleSection.innerHTML = "";
    }
  },

  showBeatDetail(beatId) {
    const beat = nodeById(beatId);
    if (!beat) return;
    const connTechniques = [];
    const connCatharsis = [];
    G.edges.forEach(e => {
      if (e.source === beatId && e.type === "beat_uses_technique") {
        const nd = nodeById(e.target);
        if (nd) connTechniques.push(nd);
      }
      if (e.target === beatId && e.type === "beat_uses_technique") {
        const nd = nodeById(e.source);
        if (nd) connTechniques.push(nd);
      }
      if (e.source === beatId && e.type === "beat_delivers_catharsis") {
        const nd = nodeById(e.target);
        if (nd) connCatharsis.push(nd);
      }
      if (e.target === beatId && e.type === "beat_delivers_catharsis") {
        const nd = nodeById(e.source);
        if (nd) connCatharsis.push(nd);
      }
    });

    let html = `<div class="card" style="border-color:${COLORS.beat}44">
      <h3 style="color:${COLORS.beat}">${esc(beat.name)}</h3>
      ${beat.description ? `<div style="color:#94a3b8;font-size:13px;line-height:1.5;margin:6px 0">${esc(beat.description)}</div>` : ""}
      ${beat.beat_category ? `<div style="margin:4px 0"><span class="tag-chip" style="background:${COLORS.beat}33;color:${COLORS.beat}">${esc(this.beatCatLabels[beat.beat_category]||beat.beat_category)}</span></div>` : ""}
      ${beat.position_pct !== undefined && beat.position_pct !== -1 ? `<div style="font-size:12px;color:#64748b;margin:4px 0">位置: ${beat.position_pct}%</div>` : ""}`;
    if (connTechniques.length) {
      html += `<div class="recipe-section"><h4>使用技巧</h4>${connTechniques.map(t => `<span class="recipe-item" style="background:${COLORS.technique}33;color:${COLORS.technique}">${esc(t.name)}</span>`).join("")}</div>`;
    }
    if (connCatharsis.length) {
      html += `<div class="recipe-section"><h4>触发爽点</h4>${connCatharsis.map(c => `<span class="recipe-item" style="background:${COLORS.catharsis}33;color:${COLORS.catharsis}">${esc(c.name)}</span>`).join("")}</div>`;
    }
    html += `</div>`;
    document.getElementById("t15-detail").innerHTML = html;
  }
};

const T16 = { inited:true, init(){} }; // 已合并到 Tab 5

// N1: Restore tab from URL hash on load (after all tab objects are defined)
(function() {
  const initTab = location.hash.slice(1);
  if (initTab && initTab !== "tab7" && document.getElementById(initTab)) {
    document.querySelector(`[data-tab="${initTab}"]`)?.click();
  }
})();
