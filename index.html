<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>叙事技巧知识网络</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,"Microsoft YaHei",sans-serif; background:#0f172a; color:#e2e8f0; }
/* ── Tab bar ── */
#tab-bar { display:flex; gap:0; background:#1e293b; border-bottom:1px solid #334155; position:fixed; top:0; left:0; right:0; z-index:100; height:42px; overflow-x:auto; overflow-y:hidden; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
#tab-bar::-webkit-scrollbar { display:none; }
.tab-btn { padding:8px 20px; cursor:pointer; font-size:14px; color:#94a3b8; border:none; background:none; border-bottom:2px solid transparent; transition:all .15s; white-space:nowrap; }
.tab-btn:hover { color:#e2e8f0; }
.tab-btn.active { color:#60a5fa; border-bottom-color:#3b82f6; font-weight:600; }
.tab-page { display:none; position:absolute; top:42px; left:0; right:0; bottom:0; overflow:auto; }
.tab-page.active { display:block; }
/* ── Shared ── */
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:12px; color:#fff; }
.tag-chip { background:#334155; padding:2px 8px; border-radius:10px; font-size:12px; display:inline-block; margin:2px; }
.card { background:#1e293b; border:1px solid #334155; border-radius:10px; padding:16px; }
a { color:#60a5fa; text-decoration:none; }
a:hover { text-decoration:underline; }
/* ── Shared net-tab styles ── */
.net-tab { overflow:hidden; }
.net-controls { position:absolute; top:12px; left:12px; z-index:10; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.filter-btn { padding:4px 12px; border:1px solid #334155; border-radius:16px; cursor:pointer; font-size:13px; user-select:none; transition:all .15s; }
.filter-btn.active { border-color:currentColor; font-weight:600; }
.net-search { padding:4px 10px; border:1px solid #334155; border-radius:16px; background:#1e293b; color:#e2e8f0; font-size:13px; width:160px; outline:none; }
.net-search:focus { border-color:#3b82f6; }
.net-panel { position:fixed; top:42px; right:-340px; width:320px; bottom:0; background:#1e293b; border-left:1px solid #334155; padding:20px; overflow-y:auto; transition:right .2s; z-index:20; }
.net-panel.open { right:0; }
.net-panel h3 { font-size:18px; margin-bottom:4px; }
.net-panel .desc { color:#94a3b8; margin:8px 0; line-height:1.5; }
.net-panel .urls a { font-size:12px; overflow-wrap:break-word; word-break:normal; display:block; margin:2px 0; }
.net-panel .close-btn { position:absolute; top:12px; right:12px; cursor:pointer; font-size:18px; color:#94a3b8; }
.net-stats { position:absolute; bottom:12px; left:12px; font-size:12px; color:#64748b; z-index:10; }
/* ── Tab 2: 创作卡片 ── */
#tab2 { padding:20px; }
#t2-top { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; align-items:center; }
#t2-search { padding:6px 12px; border:1px solid #334155; border-radius:16px; background:#1e293b; color:#e2e8f0; font-size:14px; width:200px; outline:none; }
#t2-count { font-size:13px; color:#64748b; margin-bottom:8px; }
#t2-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; }
.recipe-card { position:relative; }
.recipe-card h3 { font-size:16px; margin-bottom:6px; }
.recipe-section { margin:8px 0; }
.recipe-section h4 { font-size:13px; color:#94a3b8; margin-bottom:4px; }
.recipe-item { display:inline-block; padding:3px 10px; border-radius:14px; font-size:12px; margin:2px; cursor:default; }
.recipe-desc { color:#94a3b8; font-size:13px; line-height:1.5; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; margin:6px 0; }
/* ── Tab 3: 矩阵热力图 (D3 SVG) ── */
#tab3 { padding:20px; overflow:auto; }
#t3-controls { display:flex; gap:12px; margin-bottom:16px; align-items:center; flex-wrap:wrap; }
#t3-controls select { padding:4px 8px; border:1px solid #334155; border-radius:8px; background:#1e293b; color:#e2e8f0; font-size:13px; }
#t3-svg { width:100%; }
.cell-tip { position:fixed; background:#1e293b; border:1px solid #334155; padding:8px 12px; border-radius:8px; font-size:13px; pointer-events:none; z-index:100; display:none; max-width:260px; line-height:1.5; }
/* ── Tab 4: 标签筛选 ── */
#tab4 { padding:20px; }
#t4-cloud { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }
.cloud-tag { padding:6px 14px; border-radius:16px; cursor:pointer; font-size:14px; border:1px solid #334155; transition:all .15s; user-select:none; }
.cloud-tag.active { background:#3b82f6; border-color:#3b82f6; color:#fff; }
#t4-results { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; }
.t4-card h4 { font-size:15px; margin-bottom:4px; }
.t4-card .desc { color:#94a3b8; font-size:13px; line-height:1.4; }
/* ── Tab 5: 排行与推荐 ── */
#tab5 { padding:20px; }
#t5-controls { display:flex; gap:12px; margin-bottom:16px; align-items:center; flex-wrap:wrap; }
#t5-controls select { padding:4px 8px; border:1px solid #334155; border-radius:8px; background:#1e293b; color:#e2e8f0; font-size:13px; }
#t5-chart { width:100%; max-width:900px; }
#t5-recommend { margin-top:24px; }
#t5-recommend h3 { font-size:16px; margin-bottom:12px; color:#f59e0b; }
#t5-combo-list { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:12px; }
.combo-card h4 { font-size:14px; margin-bottom:6px; }
.combo-card .combo-items { display:flex; flex-wrap:wrap; gap:4px; }
.t5-time-btn { padding:3px 10px; border-radius:14px; font-size:12px; cursor:pointer; border:1px solid #334155; background:none; color:#94a3b8; transition:all .15s; }
.t5-time-btn.active { background:#3b82f611; border-color:#3b82f6; color:#60a5fa; }
/* ── Tab 7: 2D关系图 ── */
#tab7 { overflow:hidden; }
#t7-controls { position:absolute; top:12px; left:12px; z-index:10; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
#t7-stats { position:absolute; bottom:12px; left:12px; font-size:12px; color:#64748b; z-index:10; }
#t7-svg { width:100%; height:100%; }
#t7-svg .link { stroke-opacity:0.4; }
#t7-svg .node-circle { cursor:pointer; stroke:#0f172a; stroke-width:1.5px; }
#t7-svg text.node-text { font:600 15px -apple-system,"Microsoft YaHei",sans-serif; fill:#e2e8f0; pointer-events:none; text-anchor:middle; dominant-baseline:central; text-shadow:0 0 4px #0f172a,0 0 8px #0f172a; }
.t7-tooltip { position:fixed; background:#1e293b; border:1px solid #334155; padding:8px 12px; border-radius:8px; font-size:13px; pointer-events:none; z-index:100; display:none; max-width:240px; }
/* ── Tab 7: 关系图 — 详情面板 ── */
#t7-detail-panel { position:fixed; top:42px; right:-360px; width:340px; bottom:0; background:#1e293b; border-left:1px solid #334155; padding:20px; overflow-y:auto; transition:right .2s; z-index:20; }
#t7-detail-panel.open { right:0; }
#t7-detail-panel .close-btn { position:absolute; top:12px; right:12px; cursor:pointer; font-size:18px; color:#94a3b8; }
#t7-detail-panel h3 { font-size:18px; margin-bottom:4px; }
#t7-detail-panel .desc { color:#94a3b8; margin:8px 0; line-height:1.5; }
#t7-detail-panel .detail-section { margin:10px 0; }
#t7-detail-panel .detail-section h4 { font-size:13px; color:#64748b; margin-bottom:4px; }
/* ── Tab 7: 聚焦模式节点列表 ── */
#t7-focus-list { position:absolute; top:42px; left:0; width:220px; bottom:0; background:#1e293b; border-right:1px solid #334155; overflow-y:auto; padding:12px; z-index:10; display:none; }
#t7-focus-list.open { display:block; }
#t7-focus-list h4 { font-size:13px; color:#94a3b8; margin-bottom:8px; }
.t7-list-item { padding:6px 10px; border-radius:8px; cursor:pointer; font-size:13px; margin-bottom:3px; transition:background .15s; }
.t7-list-item:hover { background:#334155; }
.t7-list-item.active { background:#3b82f622; color:#60a5fa; font-weight:600; }
#t7-focus-bar { display:none; position:absolute; top:12px; right:12px; z-index:10; gap:8px; align-items:center; }
#t7-focus-bar.open { display:flex; }
.t7-hop-btn { padding:3px 10px; border-radius:14px; font-size:12px; cursor:pointer; border:1px solid #334155; background:none; color:#94a3b8; transition:all .15s; }
.t7-hop-btn.active { background:#3b82f622; border-color:#3b82f6; color:#60a5fa; }
/* ── Tab 9: 弦图 ── */
#tab9 { overflow:hidden; }
#t9-svg { width:100%; height:100%; }
.t9-tooltip { position:fixed; background:#1e293b; border:1px solid #334155; padding:8px 12px; border-radius:8px; font-size:13px; pointer-events:none; z-index:100; display:none; }
/* ── Tab 10: 桑基图 ── */
#tab10 { overflow:hidden; }
#t10-svg { width:100%; height:100%; }
.t10-tooltip { position:fixed; background:#1e293b; border:1px solid #334155; padding:8px 12px; border-radius:8px; font-size:13px; pointer-events:none; z-index:100; display:none; }
/* ── Tab 11: 图谱编辑器 ── */
#tab11 { padding:24px; }
#t11-wrap { display:flex; gap:24px; flex-wrap:wrap; }
.t11-panel { flex:1; min-width:320px; }
.t11-panel h3 { font-size:16px; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid #334155; }
.t11-field { margin-bottom:12px; }
.t11-field label { display:block; font-size:13px; color:#94a3b8; margin-bottom:4px; }
.t11-field input, .t11-field select, .t11-field textarea { width:100%; padding:6px 10px; border:1px solid #334155; border-radius:8px; background:#1e293b; color:#e2e8f0; font-size:13px; outline:none; font-family:inherit; }
.t11-field input:focus, .t11-field select:focus, .t11-field textarea:focus { border-color:#3b82f6; }
.t11-field textarea { resize:vertical; min-height:60px; }
.t11-btn { padding:8px 20px; border:none; border-radius:8px; cursor:pointer; font-size:14px; font-weight:600; transition:all .15s; }
.t11-btn-add { background:#3b82f6; color:#fff; }
.t11-btn-add:hover { background:#2563eb; }
.t11-btn-export { background:#10b981; color:#fff; }
.t11-btn-export:hover { background:#059669; }
.t11-btn-del { background:none; border:1px solid #ef4444; color:#ef4444; padding:2px 8px; font-size:12px; border-radius:6px; cursor:pointer; }
.t11-btn-del:hover { background:#ef4444; color:#fff; }
.t11-btn-undo { background:none; border:1px solid #64748b; color:#94a3b8; padding:8px 16px; border-radius:8px; cursor:pointer; font-size:14px; font-weight:600; transition:all .15s; }
.t11-btn-undo:hover:not(:disabled) { border-color:#94a3b8; color:#e2e8f0; }
.t11-btn-undo:disabled { opacity:0.4; cursor:not-allowed; }
.badge[data-type="genre"] { color:#1e293b !important; }
.export-svg-btn { padding:4px 10px; border:1px solid #334155; border-radius:16px; background:none; color:#94a3b8; cursor:pointer; font-size:12px; }
.export-svg-btn:hover { color:#e2e8f0; border-color:#64748b; }
#t11-stats { margin-top:20px; padding:16px; background:#1e293b; border:1px solid #334155; border-radius:10px; }
#t11-stats h3 { border-bottom:none; padding-bottom:0; margin-bottom:8px; }
.t11-stat-row { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:12px; }
.t11-stat-item { font-size:14px; }
.t11-stat-item b { color:#60a5fa; }
#t11-log { margin-top:16px; max-height:300px; overflow-y:auto; }
.t11-log-item { display:flex; justify-content:space-between; align-items:center; padding:6px 10px; border-radius:6px; margin-bottom:4px; font-size:13px; background:#1e293b; border:1px solid #334155; }
.t11-log-item .type-badge { font-size:11px; padding:1px 6px; border-radius:8px; color:#fff; margin-right:6px; }
/* ── Tab 11 edit/delete panels ── */
#t11-edit-wrap { display:flex; gap:24px; flex-wrap:wrap; margin-top:20px; padding-top:20px; border-top:1px solid #334155; }
.t11-sel-info { font-size:12px; color:#64748b; padding:6px 10px; background:#0f172a; border-radius:6px; margin-bottom:8px; min-height:28px; line-height:1.6; }
.t11-btn-save { background:#f59e0b; color:#1e293b; font-weight:700; width:100%; margin-bottom:6px; }
.t11-btn-save:hover:not(:disabled) { background:#d97706; }
.t11-btn-save:disabled { opacity:0.4; cursor:not-allowed; }
.t11-btn-danger { background:none; border:1px solid #ef4444; color:#ef4444; width:100%; }
.t11-btn-danger:hover:not(:disabled) { background:#ef4444; color:#fff; }
.t11-btn-danger:disabled { opacity:0.4; cursor:not-allowed; }
/* ── Tab 12: 创作灵感生成器 ── */
#tab12 { padding:24px; }
/* Sub-nav */
.t12-sub-nav { display:flex; gap:8px; margin-bottom:20px; border-bottom:1px solid #334155; padding-bottom:12px; flex-wrap:wrap; }
.t12-sub-btn { padding:6px 16px; border:1px solid #334155; border-radius:20px; cursor:pointer; font-size:13px; background:#1e293b; color:#94a3b8; transition:all .15s; }
.t12-sub-btn:hover { color:#e2e8f0; border-color:#64748b; }
.t12-sub-btn.active { background:#8b5cf6; color:#fff; border-color:#8b5cf6; }
.t12-sub-page { display:none; }
.t12-sub-page.active { display:block; }
/* 随机生成 */
#t12-controls { display:flex; gap:16px; align-items:center; flex-wrap:wrap; margin-bottom:20px; padding:16px; background:#1e293b; border:1px solid #334155; border-radius:10px; }
#t12-controls label { font-size:13px; color:#94a3b8; margin-right:4px; }
#t12-controls select { padding:5px 10px; border:1px solid #334155; border-radius:8px; background:#0f172a; color:#e2e8f0; font-size:13px; }
.t12-btn { padding:8px 20px; border:none; border-radius:8px; cursor:pointer; font-size:14px; font-weight:600; transition:all .15s; }
.t12-btn-gen { background:#8b5cf6; color:#fff; }
.t12-btn-gen:hover { background:#7c3aed; }
.t12-btn-new { background:#1e293b; border:1px solid #334155; color:#94a3b8; }
.t12-btn-new:hover { color:#e2e8f0; border-color:#64748b; }
.t12-btn-compare { background:#0f172a; border:1px solid #8b5cf6; color:#a78bfa; }
.t12-btn-compare:hover { background:#1e1b4b; }
.t12-btn-save { background:#0f172a; border:1px solid #10b981; color:#34d399; }
.t12-btn-save:hover { background:#022c22; }
#t12-output { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:16px; }
.t12-recipe { background:#1e293b; border:1px solid #334155; border-radius:12px; padding:20px; }
.t12-recipe h4 { font-size:15px; margin-bottom:14px; color:#e2e8f0; border-bottom:1px solid #334155; padding-bottom:8px; display:flex; justify-content:space-between; align-items:center; }
.t12-item { display:flex; align-items:flex-start; gap:10px; margin-bottom:10px; }
.t12-icon { font-size:18px; flex-shrink:0; width:24px; }
.t12-info { flex:1; }
.t12-name { font-size:14px; font-weight:600; }
.t12-desc { font-size:12px; color:#94a3b8; margin-top:2px; line-height:1.4; }
.t12-fixed-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.t12-lock-btn { padding:4px 10px; border-radius:14px; font-size:12px; cursor:pointer; border:1px solid #334155; background:none; color:#94a3b8; transition:all .15s; }
.t12-lock-btn.locked { background:#f59e0b22; border-color:#f59e0b; color:#f59e0b; }
.t12-synergy-bar { margin-top:12px; padding-top:10px; border-top:1px solid #334155; }
.t12-synergy-score { font-size:13px; color:#64748b; }
/* 手动搭配 */
/* 手动搭配: 整体占满剩余视口高度，底部按钮始终可见 */
#t12-sub-manual.active { height:calc(100vh - 148px); display:flex; flex-direction:column; overflow:hidden; }
#t12-manual { display:flex; gap:16px; flex:1; min-height:0; align-items:stretch; }
.t12-manual-col { flex:1; min-width:150px; max-width:230px; display:flex; flex-direction:column; }
.t12-manual-col h5 { font-size:13px; color:#94a3b8; margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid #334155; flex-shrink:0; }
.t12-chip-wrap { flex:1; min-height:0; display:flex; flex-wrap:wrap; gap:6px; overflow-y:auto; padding:2px; align-content:flex-start; }
.t12-chip { padding:4px 10px; border-radius:12px; font-size:12px; cursor:pointer; border:1px solid #334155; color:#94a3b8; background:#0f172a; transition:all .15s; user-select:none; height:fit-content; }
.t12-chip:hover { border-color:#64748b; color:#e2e8f0; }
.t12-chip.selected { background:#8b5cf622; border-color:#8b5cf6; color:#c4b5fd; }
#t12-manual-right { flex:1; min-width:240px; display:flex; flex-direction:column; }
#t12-manual-right h5 { font-size:13px; color:#94a3b8; margin-bottom:8px; flex-shrink:0; }
#t12-synergy-svg { width:100%; flex:1; min-height:0; background:#0f172a; border:1px solid #334155; border-radius:10px; display:block; }
#t12-synergy-score-box { padding:10px 14px; background:#1e293b; border:1px solid #334155; border-radius:8px; margin-top:10px; font-size:13px; flex-shrink:0; }
#t12-manual-actions { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; flex-shrink:0; }
/* 节拍编排 */
#t12-beat-controls { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:16px; }
#t12-beat-controls label { font-size:13px; color:#94a3b8; }
#t12-beat-controls select { padding:5px 10px; border:1px solid #334155; border-radius:8px; background:#0f172a; color:#e2e8f0; font-size:13px; }
#t12-beat-board { display:flex; gap:12px; flex-wrap:nowrap; overflow-x:auto; padding-bottom:10px; margin-bottom:4px; }
.t12-beat-slot { min-width:155px; max-width:195px; background:#0f172a; border:2px dashed #334155; border-radius:12px; padding:12px; flex-shrink:0; transition:border-color .15s; cursor:pointer; }
.t12-beat-slot.dragover { border-color:#8b5cf6; background:#1e1b4b; }
.t12-beat-slot.focused { border-color:#8b5cf6; border-style:solid; }
.t12-beat-slot-header { font-size:12px; color:#8b5cf6; margin-bottom:4px; font-weight:700; }
.t12-beat-slot-hint { font-size:11px; color:#475569; margin-bottom:8px; line-height:1.4; min-height:26px; }
.t12-beat-node-chip { background:#1e293b; border:1px solid #334155; border-radius:6px; padding:5px 8px; font-size:12px; color:#e2e8f0; display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
.t12-beat-node-chip .rm { cursor:pointer; color:#475569; font-size:13px; margin-left:6px; flex-shrink:0; }
.t12-beat-node-chip .rm:hover { color:#ef4444; }
.t12-beat-slot-empty { font-size:11px; color:#334155; text-align:center; padding:6px 0; }
#t12-beat-source { margin-top:12px; }
#t12-beat-source h5 { font-size:13px; color:#94a3b8; margin-bottom:8px; }
#t12-beat-chips { display:flex; flex-wrap:wrap; gap:6px; max-height:180px; overflow-y:auto; }
.t12-beat-src-chip { padding:5px 12px; border-radius:12px; font-size:12px; cursor:grab; border:1px solid #334155; color:#94a3b8; background:#0f172a; transition:all .15s; }
.t12-beat-src-chip:hover { border-color:#8b5cf6; color:#c4b5fd; }
.t12-beat-src-chip.dragging { opacity:.4; }
/* 收藏库 */
#t12-vault-empty { color:#475569; font-size:14px; text-align:center; padding:40px 0; }
.t12-vault-item { background:#1e293b; border:1px solid #334155; border-radius:10px; padding:14px 16px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
.t12-vault-item-body { flex:1; }
.t12-vault-item-name { font-size:14px; font-weight:600; color:#e2e8f0; margin-bottom:4px; }
.t12-vault-item-tags { font-size:12px; color:#64748b; line-height:1.5; }
.t12-vault-item-date { font-size:11px; color:#475569; margin-top:2px; }
.t12-vault-actions { display:flex; gap:6px; flex-shrink:0; }
.t12-vault-btn { padding:4px 10px; border-radius:6px; border:1px solid #334155; background:none; color:#94a3b8; font-size:12px; cursor:pointer; transition:all .15s; }
.t12-vault-btn:hover { color:#e2e8f0; border-color:#64748b; }
.t12-vault-btn.danger:hover { color:#ef4444; border-color:#ef4444; }
#t12-vault-toolbar { display:flex; gap:10px; margin-bottom:16px; align-items:center; flex-wrap:wrap; }
/* ── Tab 13: 案例拆解 ── */
#tab13 { padding:0; }
#tab13.active { display:flex!important; }
#t13-layout { display:flex; width:100%; height:100%; }
#t13-sidebar { width:240px; border-right:1px solid #334155; overflow-y:auto; padding:16px; flex-shrink:0; }
#t13-sidebar h3 { font-size:14px; color:#94a3b8; margin-bottom:12px; }
.t13-work-item { padding:10px 12px; border-radius:8px; cursor:pointer; margin-bottom:6px; border:1px solid #334155; transition:all .15s; }
.t13-work-item:hover { border-color:#64748b; }
.t13-work-item.active { border-color:#8b5cf6; background:#1e1b4b; }
.t13-work-name { font-size:14px; font-weight:600; color:#e2e8f0; margin-bottom:2px; }
.t13-work-meta { font-size:11px; color:#64748b; }
#t13-main { flex:1; overflow-y:auto; padding:24px; }
#t13-header { margin-bottom:20px; }
#t13-header h2 { font-size:20px; margin-bottom:4px; }
#t13-header .t13-desc { color:#94a3b8; font-size:13px; line-height:1.5; }
#t13-timeline { position:relative; padding-left:28px; }
.t13-beat { position:relative; margin-bottom:20px; padding:14px 16px; background:#1e293b; border:1px solid #334155; border-radius:10px; }
.t13-beat::before { content:""; position:absolute; left:-22px; top:18px; width:12px; height:12px; border-radius:50%; background:#8b5cf6; border:2px solid #0f172a; z-index:1; }
.t13-beat::after { content:""; position:absolute; left:-17px; top:30px; width:2px; height:calc(100% + 8px); background:#334155; }
.t13-beat:last-child::after { display:none; }
.t13-beat-name { font-size:13px; font-weight:700; color:#8b5cf6; margin-bottom:4px; }
.t13-beat-desc { font-size:13px; color:#94a3b8; line-height:1.5; margin-bottom:8px; }
.t13-beat-elements { display:flex; flex-wrap:wrap; gap:4px; }
</style>
</head>

function exportSVG(svgId, filename) {
  const svg = document.getElementById(svgId);
  if (!svg) return;
  const clone = svg.cloneNode(true);
  clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
  const bg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
  bg.setAttribute("width", "100%"); bg.setAttribute("height", "100%"); bg.setAttribute("fill", "#0f172a");
  clone.insertBefore(bg, clone.firstChild);
  const blob = new Blob([clone.outerHTML], {type: "image/svg+xml"});
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
  a.download = filename + ".svg"; a.click();
}

    const allGenres = G.nodes.filter(n => n.type === "genre");
    const genres = allGenres.filter(n => !q || n.name.toLowerCase().includes(q));
    const grid = document.getElementById("t2-grid");
    const countEl = document.getElementById("t2-count");

    // U2: search result count
    if (countEl) {
      if (!q) {
        countEl.textContent = "";
      } else if (genres.length === 0) {
        countEl.innerHTML = `<div style="color:#64748b;font-size:13px;margin-bottom:8px;">没有找到"${esc(q)}"相关题材</div>`;
      } else {
        countEl.innerHTML = `<div style="color:#64748b;font-size:13px;margin-bottom:8px;">找到 ${genres.length} 个题材</div>`;
      }
    }

    const html = genres.map(g => {
      const nb = neighbors(g.id);
      const grouped = {catharsis:[], twist:[], technique:[], setting:[], archetype:[], conflict_pattern:[], antagonist_pattern:[], power_system:[], engagement_mechanic:[], format:[], work_reference:[]};
      nb.forEach(({node: nid, edge}) => {
        const nd = nodeById(nid);
        if (nd && grouped[nd.type] !== undefined) grouped[nd.type].push(nd);
      });
      // Also gather nodes connected via genre-specific edge types
      G.edges.forEach(e => {
        const isSource = e.source === g.id, isTarget = e.target === g.id;
        if (!isSource && !isTarget) return;
        const otherId = isSource ? e.target : e.source;
        const nd = nodeById(otherId);
        if (!nd) return;
        if (e.type === 'antagonist_appears_in_genre' && nd.type === 'antagonist_pattern' && !grouped.antagonist_pattern.find(x => x.id === nd.id)) grouped.antagonist_pattern.push(nd);
        if (e.type === 'power_system_in_genre' && nd.type === 'power_system' && !grouped.power_system.find(x => x.id === nd.id)) grouped.power_system.push(nd);
        if (e.type === 'engagement_retains_in_genre' && nd.type === 'engagement_mechanic' && !grouped.engagement_mechanic.find(x => x.id === nd.id)) grouped.engagement_mechanic.push(nd);
        if (e.type === 'format_suits_genre' && nd.type === 'format' && !grouped.format.find(x => x.id === nd.id)) grouped.format.push(nd);
        if (e.type === 'work_belongs_to_genre' && nd.type === 'work_reference' && !grouped.work_reference.find(x => x.id === nd.id)) grouped.work_reference.push(nd);
      });

      const sections = [
        {key:"setting",          label:"世界设定", items: grouped.setting},
        {key:"catharsis",        label:"爽点", items: grouped.catharsis},
        {key:"twist",            label:"转折", items: grouped.twist},
        {key:"technique",        label:"技巧", items: grouped.technique},
        {key:"archetype",        label:"角色原型", items: grouped.archetype},
        {key:"conflict_pattern", label:"冲突模式", items: grouped.conflict_pattern},
        {key:"antagonist_pattern", label:"反派模式", items: grouped.antagonist_pattern},
        {key:"power_system", label:"力量体系", items: grouped.power_system},
        {key:"engagement_mechanic", label:"留存机制", items: grouped.engagement_mechanic},
        {key:"format", label:"格式", items: grouped.format},
        {key:"work_reference", label:"参考作品", items: grouped.work_reference},
      ].filter(s => s.items.length > 0);

      const tagsHtml = (g.tags||[]).map(t => `<span class="tag-chip">${esc(t)}</span>`).join("");
      // D1: use recipe-desc class for description
      const descHtml = g.description ? `<div class="recipe-desc">${esc(g.description)}</div>` : "";
      // Examples (representative works)
      const examplesHtml = (g.examples||[]).length > 0
        ? `<div style="margin:6px 0;font-size:12px;color:#64748b"><span style="color:#94a3b8">代表作品:</span> ${g.examples.map(ex => `<span style="color:#e2e8f0">${esc(ex)}</span>`).join("、")}</div>`
        : "";
      const sectionsHtml = sections.map(s =>
        `<div class="recipe-section"><h4>${s.label}</h4>${
          s.items.map(i => {
            const exTip = (i.examples||[]).length ? " | 例: " + i.examples.slice(0,2).join("、") : "";
            return `<span class="recipe-item" style="background:${COLORS[s.key]}33;color:${COLORS[s.key]}" title="${esc((i.description||'')+exTip)}">${esc(i.name)}</span>`;
          }).join("")
        }</div>`
      ).join("");

      return `<div class="card recipe-card">
        <h3 style="color:${COLORS.genre}">${esc(g.name)}</h3>
        ${tagsHtml}${descHtml}${examplesHtml}${sectionsHtml}
        ${sections.length===0?'<div style="color:#64748b;font-size:13px">暂无关联要素</div>':""}
      </div>`;
    }).join("");

    grid.innerHTML = html || '<div style="color:#64748b;padding:20px">没有匹配的题材</div>';
  }
};

// ════════════════════════════════════════════════════════════════════════
// Tab 3: 矩阵热力图 (D3 SVG 实现)
// ════════════════════════════════════════════════════════════════════════
const T3 = {
  inited: false,
  init() {
    this.inited = true;
    this.render();
    document.getElementById("t3-row-type").addEventListener("change", () => this.render());
    document.getElementById("t3-col-type").addEventListener("change", () => this.render());
    document.getElementById("t3-sort").addEventListener("change", () => this.render());
  },
  render() {
    const rowType = document.getElementById("t3-row-type").value;
    const colType = document.getElementById("t3-col-type").value;
    const sortMode = document.getElementById("t3-sort").value;

    let rows = G.nodes.filter(n => n.type === rowType);
    let cols = G.nodes.filter(n => n.type === colType);

    // Build matrix
    const mat = {};
    const rowSum = {}, colSum = {};
    G.edges.forEach(e => {
      const sn = nodeById(e.source), tn = nodeById(e.target);
      if (!sn || !tn) return;
      const w = e.weight || 1;
      if (sn.type===rowType && tn.type===colType) {
        const key = sn.id+"||"+tn.id;
        mat[key] = (mat[key]||0)+w;
        rowSum[sn.id] = (rowSum[sn.id]||0)+w;
        colSum[tn.id] = (colSum[tn.id]||0)+w;
      }
      if (tn.type===rowType && sn.type===colType) {
        const key = tn.id+"||"+sn.id;
        mat[key] = (mat[key]||0)+w;
        rowSum[tn.id] = (rowSum[tn.id]||0)+w;
        colSum[sn.id] = (colSum[sn.id]||0)+w;
      }
    });

    // Sort
    if (sortMode === "connections") {
      rows.sort((a,b) => (rowSum[b.id]||0) - (rowSum[a.id]||0));
      cols.sort((a,b) => (colSum[b.id]||0) - (colSum[a.id]||0));
    } else {
      rows.sort((a,b) => a.name.localeCompare(b.name, "zh-CN"));
      cols.sort((a,b) => a.name.localeCompare(b.name, "zh-CN"));
    }

    const maxW = Math.max(1, ...Object.values(mat));
    if (rows.length === 0 || cols.length === 0) {
      d3.select("#t3-svg").selectAll("*").remove();
      d3.select("#t3-svg").attr("width", 400).attr("height", 80)
        .append("text").attr("x", 200).attr("y", 40).attr("text-anchor", "middle")
        .attr("fill", "#64748b").attr("font-size", 14).text("暂无数据");
      return;
    }

    // Dimensions
    const cellSize = 36;
    const maxLabelW = Math.min(160, Math.max(...rows.map(r => r.name.length)) * 14 + 10);
    const maxLabelH = Math.min(180, Math.max(...cols.map(c => c.name.length)) * 12 + 10);
    const margin = { top: maxLabelH + 10, left: maxLabelW + 10, right: 20, bottom: 20 };
    const width = margin.left + cols.length * cellSize + margin.right;
    const height = margin.top + rows.length * cellSize + margin.bottom;

    // Color scale: blue gradient
    const colorScale = d3.scaleSequential(d3.interpolateBlues).domain([0, maxW]);

    const svg = d3.select("#t3-svg").attr("width", width).attr("height", height);
    svg.selectAll("*").remove();
    const g = svg.append("g");

    const tip = document.getElementById("t3-tip");

    // Cells
    rows.forEach((r, ri) => {
      cols.forEach((c, ci) => {
        const v = mat[r.id+"||"+c.id] || 0;
        const x = margin.left + ci * cellSize;
        const y = margin.top + ri * cellSize;

        g.append("rect")
          .attr("x", x + 1).attr("y", y + 1)
          .attr("width", cellSize - 2).attr("height", cellSize - 2)
          .attr("rx", 4).attr("ry", 4)
          .attr("fill", v > 0 ? colorScale(v) : "#1e293b")
          .attr("stroke", "#0f172a").attr("stroke-width", 1)
          .attr("cursor", v > 0 ? "pointer" : "default")
          .on("mouseenter", ev => {
            if (v === 0) return;
            tip.innerHTML = `<b style="color:${COLORS[rowType]}">${esc(r.name)}</b> × <b style="color:${COLORS[colType]}">${esc(c.name)}</b><br>权重: <b>${v}</b>`;
            tip.style.display = "block";
          })
          .on("mousemove", ev => {
            tip.style.left = (ev.clientX + 14) + "px";
            tip.style.top = (ev.clientY + 14) + "px";
          })
          .on("mouseleave", () => { tip.style.display = "none"; });

        if (v > 0) {
          g.append("text")
            .attr("x", x + cellSize/2).attr("y", y + cellSize/2)
            .attr("text-anchor", "middle").attr("dominant-baseline", "central")
            .attr("fill", v/maxW > 0.5 ? "#fff" : "#94a3b8")
            .attr("font-size", 11).attr("font-weight", 600)
            .attr("pointer-events", "none")
            .text(v);
        }
      });
    });

    // Row labels (left)
    rows.forEach((r, ri) => {
      g.append("text")
        .attr("x", margin.left - 6)
        .attr("y", margin.top + ri * cellSize + cellSize/2)
        .attr("text-anchor", "end").attr("dominant-baseline", "central")
        .attr("fill", COLORS[rowType] || "#94a3b8")
        .attr("font-size", 12)
        .text(r.name.length > 10 ? r.name.slice(0,10)+"…" : r.name)
        .append("title").text(r.name);
    });

    // Column labels (top, rotated)
    cols.forEach((c, ci) => {
      g.append("text")
        .attr("x", 0).attr("y", 0)
        .attr("transform", `translate(${margin.left + ci * cellSize + cellSize/2},${margin.top - 6}) rotate(-55)`)
        .attr("text-anchor", "start").attr("dominant-baseline", "central")
        .attr("fill", COLORS[colType] || "#94a3b8")
        .attr("font-size", 12)
        .text(c.name.length > 10 ? c.name.slice(0,10)+"…" : c.name)
        .append("title").text(c.name);
    });
  }
};

// Tab 4: 标签筛选
// ════════════════════════════════════════════════════════════════════════
const T4 = {
  inited: false,
  activeTags: new Set(),
  init() {
    this.inited = true;
    const tags = allTags();
    const tagCounts = {};
    G.nodes.forEach(n => (n.tags||[]).forEach(t => { tagCounts[t] = (tagCounts[t]||0)+1; }));
    tags.sort((a,b) => (tagCounts[b]||0) - (tagCounts[a]||0));

    const MIN_FREQ = 3;
    const primary = tags.filter(t => (tagCounts[t]||0) >= MIN_FREQ);
    const secondary = tags.filter(t => (tagCounts[t]||0) < MIN_FREQ);

    const cloud = document.getElementById("t4-cloud");
    const mkTag = t => `<span class="cloud-tag" data-tag="${esc(t)}">${esc(t)} <span style="font-size:11px;color:#64748b;margin-left:2px">${tagCounts[t]||0}</span></span>`;
    let html = primary.map(mkTag).join("");
    if (secondary.length) {
      html += `<div style="margin-top:10px"><button id="t4-toggle-rare" style="background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:13px">展开低频标签 (${secondary.length})</button></div>`;
      html += `<div id="t4-rare-tags" style="display:none;margin-top:8px">${secondary.map(mkTag).join("")}</div>`;
    }
    cloud.innerHTML = html;

    if (secondary.length) {
      const toggleBtn = document.getElementById("t4-toggle-rare");
      const rareDiv = document.getElementById("t4-rare-tags");
      toggleBtn.addEventListener("click", () => {
        const show = rareDiv.style.display === "none";
        rareDiv.style.display = show ? "" : "none";
        toggleBtn.textContent = show ? `收起低频标签 (${secondary.length})` : `展开低频标签 (${secondary.length})`;
      });
    }

    cloud.querySelectorAll(".cloud-tag").forEach(el => {
      el.addEventListener("click", () => {
        const tag = el.dataset.tag;
        el.classList.toggle("active");
        if (this.activeTags.has(tag)) this.activeTags.delete(tag); else this.activeTags.add(tag);
        this.renderResults();
      });
    });
    this.renderResults();
  },
  renderResults() {
    const container = document.getElementById("t4-results");
    let nodes = G.nodes;
    if (this.activeTags.size > 0) {
      nodes = nodes.filter(n => [...this.activeTags].every(t => (n.tags||[]).includes(t)));
    }
    // group by type
    const grouped = {};
    nodes.forEach(n => { (grouped[n.type] = grouped[n.type]||[]).push(n); });

    let html = "";
    const allTypes = ["genre","catharsis","twist","technique","setting","archetype","beat","conflict_pattern","antagonist_pattern","character_arc","power_system","engagement_mechanic","format","work_reference"];
    for (const type of allTypes) {
      const list = grouped[type];
      if (!list || list.length===0) continue;
      list.forEach(n => {
        const tags = (n.tags||[]).map(t => `<span class="tag-chip">${esc(t)}</span>`).join("");
        html += `<div class="card t4-card">
          <h4><span class="badge" style="background:${COLORS[type]}">${TL[type]}</span> ${esc(n.name)}</h4>
          <div class="desc">${esc(n.description||"暂无描述")}</div>
          <div style="margin-top:6px">${tags}</div>
        </div>`;
      });
    }
    container.innerHTML = html || '<div style="color:#64748b;padding:20px">选择标签以筛选概念</div>';
  }
};
